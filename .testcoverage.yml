# The coverage gate, enforced before every commit (see
# .pre-commit-config.yaml, which runs go-test-coverage over the
# profile the test hook writes).
#
# The thresholds are a ratchet: each one is set just under what the
# tests actually measure today, so a change that loses coverage fails
# loudly, and a change that gains coverage should raise the number
# here to keep the gain. Numbers only go up, and no package sits
# below 60.
#
# The numbers deliberately differ by package. machine/ is pure types
# and parsing, testable to the last line. init/ is mostly boot
# machinery (mounting, supervising k3s, the reboot syscall) that only
# a real machine can exercise; what's unit-testable there is the
# decision-making, which is why the decisions live in separate
# functions from the syscalls that act on them, and why the fake
# sysfs, efivars, and command-line fixtures exist.

profile: coverage.out

threshold:
  # The whole module, everything counted.
  total: 65

override:
  # The Machine API: pure functions over declared types. (Paths here
  # are regexes over module-relative package paths.)
  - path: ^machine$
    threshold: 87
  # The Kubernetes client: every verb is exercised against a real
  # HTTP test server; what goes untested is the in-cluster
  # bootstrapping that only a pod's mounted credentials can satisfy.
  - path: ^kubernetes$
    threshold: 81
  # The machine operator: its decisions (drift, staging validation,
  # the convergence truth table, the drain) are pure and tested; the
  # reconcile pass that strings them together against the real facts
  # files and the live API is exercised by the QEMU harness, not unit
  # tests.
  - path: ^machine-operator$
    threshold: 61
  # The cluster operator: the sweep and rollout decisions are pure
  # and tested, and the acting halves run against a miniature API
  # server; what goes untested is main's loop.
  - path: ^cluster-operator$
    threshold: 82
  # Init: the boot machinery itself (mounting, DHCP, the reboot
  # syscall) is exercised by the QEMU harness, not unit tests; the
  # parsers, planners, derivations, and file-shaped actuators around
  # it are tested here against fakes.
  - path: ^init$
    threshold: 61
  # The image inventory: reading the deployment's manifests for the
  # build; what goes untested is main's argument plumbing.
  - path: ^image/inventory$
    threshold: 82
  # The log relays: parsing and tailing are pure or run against real
  # temp files; what goes untested is the real /dev/kmsg device and
  # the clock syscalls.
  - path: ^logs$
    threshold: 77
  # The release file server: one handler and its logging, exercised
  # against httptest.
  - path: ^releases/serve$
    threshold: 68
