# The coverage gate, enforced before every commit (see
# .pre-commit-config.yaml, which runs go-test-coverage over the
# profile the test hook writes).
#
# The thresholds are a ratchet, not an aspiration: each one is set
# just under what the tests actually measure today, so a change that
# loses coverage fails loudly, and a change that gains it should
# raise the number here to bank the gain. Numbers only go up.
#
# The numbers differ by package on purpose. machine/ is pure types
# and parsing, testable to the last line. init/ is mostly boot
# machinery (mounting, supervising k3s, the reboot syscall) that only
# a real machine can exercise; what's unit-testable there is the
# decision-making, which is why the decisions live in separate
# functions from the syscalls that act on them.

profile: coverage.out

threshold:
  # The whole module, everything counted.
  total: 51

override:
  # The Machine API: pure functions over declared types. (Paths here
  # are regexes over module-relative package paths.)
  - path: ^machine$
    threshold: 85
  # The operator: its decisions (drift, staging validation, the
  # convergence truth table, the fleet sweep, the lease election) are
  # pure and tested, and everything that speaks HTTP — the API
  # client, the seeding loops, the watch stream, the leases — is
  # exercised against a real HTTP test server.
  - path: ^operator$
    threshold: 57
  # Init: the boot machinery itself (mounting, DHCP, the reboot
  # syscall) is exercised by the QEMU harness, not unit tests; the
  # parsers, planners, and derivations around it are tested here.
  - path: ^init$
    threshold: 41
