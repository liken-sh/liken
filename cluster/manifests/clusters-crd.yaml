# The Cluster API, declared to Kubernetes.
#
# The second of liken's two resource kinds: a Machine describes one
# computer, and a Cluster describes what the machines form together.
# The split follows who must agree on what. Every fact here is one
# of two kinds. Either the whole fleet holds the fact identically
# (which machines run control planes, the address ranges pods and
# services live in), or the fact belongs to the group and no single
# machine owns it (the endpoint followers join through).
#
# Like the Machine CRD, this file lands in k3s's auto-deploy
# manifests directory and applies at every startup. The liken
# operator seeds the in-cluster Cluster object from the image's
# /etc/liken/cluster.yaml (every machine's operator tries; the first
# one succeeds, and an already-seeded cluster is left exactly as it
# stands, kubectl edits and all).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusters.liken.sh
spec:
  group: liken.sh
  names:
    kind: Cluster
    listKind: ClusterList
    plural: clusters
    singular: cluster
    # `kubectl get liken` shows the whole OS layer at once, the way
    # `kubectl get all` shows workloads.
    categories: [liken]
  # Cluster-scoped, like Machine: namespaces live inside the cluster,
  # so the cluster itself cannot live inside one of them.
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      # The status subresource splits the object the same way the
      # Machine's does. A person, or one day a git repository,
      # declares the spec. The leaders' fleet sweep observes the
      # status. The API server enforces that neither write path can
      # touch the other's half.
      subresources:
        status: {}
      # What `kubectl get clusters` prints, without -o yaml.
      additionalPrinterColumns:
        - name: Status
          type: string
          jsonPath: .status.phase
        # The headcount: how many machines are fully healthy out of
        # how many exist, as the leaders last observed it.
        - name: Machines
          type: string
          jsonPath: .status.machines.summary
        # The upgrade at a glance, in three columns. VERSION is the
        # version the fleet is being moved toward (declared, one
        # edit). NEWEST is the newest version the catalog offers
        # (observed by the sweep). AVAILABLE is the latest version
        # the channel itself announces (polled from its
        # channel.yaml). VERSION behind NEWEST means a cataloged
        # release that nobody has asked for yet. NEWEST behind
        # AVAILABLE means the channel holds something this cluster
        # has not yet cataloged. The Machine listing's LIKEN column
        # shows the rollout moving machines onto the target.
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Newest
          type: string
          jsonPath: .status.releases.newest
        - name: Available
          type: string
          jsonPath: .status.releases.available
        - name: Leaders
          type: string
          jsonPath: .spec.leaders
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            A Cluster is what liken machines form together: the
            topology (which machines run control planes) and the
            network facts every node must agree on.
          properties:
            spec:
              type: object
              # The one cross-field rule the Cluster carries: a target
              # version must name a release that the catalog actually
              # lists. Both fields live on this same object, so the
              # system can fully check the rule at admission. This
              # refuses a mistyped target while the kubectl edit is
              # still open, instead of letting it surface minutes
              # later as a condition on every machine. (Contrast the
              # Machine's storage rules, which compare aspiration
              # against observed status, because the truth lives off
              # the object.)
              x-kubernetes-validations:
                - rule: >-
                    !has(self.version) || (has(self.releases) &&
                    has(self.releases.catalog) &&
                    self.releases.catalog.exists(entry, entry.version == self.version))
                  message: >-
                    spec.version must name a release listed in
                    spec.releases.catalog; publish the release and add
                    its catalog entry first
                # Origin's one legal transition. The rule is checked
                # here at the spec level, because it needs to see
                # absence. A deployment declares adoption at the
                # document's birth, in the seed cluster.yaml baked
                # into an adopted image. A cluster that has ever been
                # founded can only stay founded. Referencing oldSelf
                # makes this a transition rule, so creation stays
                # unconstrained. This is exactly how a document born
                # adopted gets in.
                - rule: >-
                    !has(self.origin) || self.origin == 'Founded' ||
                    (has(oldSelf.origin) && oldSelf.origin == 'Adopted')
                  message: >-
                    origin: Adopted is declared when the cluster
                    document is born, never by editing a founded
                    cluster; the only legal edit is the promotion,
                    Adopted to Founded
              properties:
                version:
                  type: string
                  maxLength: 64
                  # liken versions are a calendar date and a serial,
                  # yyyy.mm.dd-nnn. The date says when the release
                  # was cut, and deliberately nothing else (the
                  # release document's components record what
                  # shipped). The pattern catches a typo at
                  # admission, the way the digest pattern below does,
                  # instead of leaving a machine unable to find the
                  # release it was asked to run.
                  pattern: ^\d{4}\.\d{2}\.\d{2}-\d{3}$
                  description: >-
                    The fleet's target liken release: the one field an
                    upgrade edits. Machines carry no version in their
                    specs. Each machine's operator compares its
                    running version (status.version.liken) against
                    this target, and moves toward it through the same
                    staged-change-and-granted-reboot machinery every
                    other change uses. Must name an entry in
                    releases.catalog.
                releases:
                  type: object
                  description: >-
                    Where release artifacts come from, and which
                    releases exist. Like version, the operator reads
                    this live on every pass, and deliberately excludes
                    it from the cluster document that machines stage
                    and reboot into. Publishing a release must move
                    machines through downloads and sequenced reboots.
                    It must never stage a fleet-wide configuration
                    reboot of its own. The fleet observer polls the
                    channel's root document on a lazy interval; to
                    request an immediate poll, set the Cluster's
                    liken.sh/check-releases annotation to any new
                    value, such as a timestamp. The content itself
                    means nothing: the edit is the request. This is
                    an annotation rather than a spec field, because
                    it asks for one action instead of declaring a
                    standing state, the same shape kubectl uses to
                    request a Deployment rollout.
                  properties:
                    source:
                      type: string
                      maxLength: 2048
                      pattern: ^https?://.+$
                      description: >-
                        The base URL releases are served under. A
                        release's artifacts live at
                        <source>/<version>/, starting with
                        release.yaml, the document that names every
                        artifact by digest.
                    catalog:
                      type: array
                      # A map keyed by version: one entry per release.
                      # The API server itself refuses duplicates.
                      x-kubernetes-list-type: map
                      x-kubernetes-list-map-keys: [version]
                      maxItems: 256
                      description: >-
                        The releases machines may be asked to run.
                        Each entry's digest is the sha256 of that
                        release's release.yaml bytes, and it is the
                        root of the trust chain: this API names the
                        document, the document names the artifacts,
                        and the system checks every downloaded byte
                        against one or the other.
                      items:
                        type: object
                        required: [version, digest]
                        properties:
                          version:
                            type: string
                            maxLength: 64
                            # The same grammar spec.version enforces:
                            # a calendar date and serial.
                            pattern: ^\d{4}\.\d{2}\.\d{2}-\d{3}$
                          digest:
                            type: string
                            maxLength: 71
                            pattern: ^sha256:[0-9a-f]{64}$
                origin:
                  type: string
                  # CamelCase values, because Kubernetes API constants
                  # are CamelCase, like the phases and rebootPolicy.
                  enum: [Founded, Adopted]
                  description: >-
                    How the cluster's datastore came to exist.
                    Founded (the default when unset) means liken
                    created it, through the founding leader's
                    cluster-init. Adopted means the datastore already
                    exists in a cluster liken did not create. Machines
                    built with that cluster's identity join it as
                    members, including the founding leader, and none
                    may initialize a new one. A deployment declares
                    adoption when the document is born. The one legal
                    edit is the promotion, Adopted to Founded, made
                    after the last foreign member is gone. Promotion
                    changes nothing on a running fleet, because k3s
                    ignores cluster-init when the datastore already
                    exists. It matters when the cluster is rebuilt
                    from scratch: a founded cluster's founder may
                    create the datastore again.
                leaders:
                  type: array
                  # Atomic, not a set: order carries meaning. The
                  # first entry is the founding leader, the machine
                  # that renders cluster-init and creates the
                  # embedded etcd datastore (or, on the migration
                  # boot, converts to it). (In an adopted cluster
                  # nobody creates a datastore. The founder joins
                  # through the endpoint like every other machine.)
                  x-kubernetes-list-type: atomic
                  description: >-
                    The machines that run control planes, by Machine
                    name. A machine derives its role from this list:
                    named here means leader, and absent means
                    follower. The first entry is the founding leader,
                    whose address the other leaders join through.
                  items:
                    type: string
                    maxLength: 253
                endpoint:
                  type: string
                  maxLength: 2048
                  pattern: ^https://.+$
                  description: >-
                    The URL followers join the cluster through, for
                    example https://10.10.0.1:6443. With one leader
                    this is that leader's address on the node
                    network.
                network:
                  type: object
                  description: >-
                    The cluster's address plan: facts k3s requires
                    every node to agree on, declared once here rather
                    than repeated per machine. Unset fields fall back
                    to k3s's defaults. Every field is immutable once
                    set. k3s cannot change any of them on a live
                    cluster, so an edit here would change nothing
                    while claiming otherwise, and the mismatch would
                    only surface at the next reboot. The CEL
                    transition rules (self == oldSelf) evaluate only
                    when the old value exists, which is exactly what
                    "immutable once set" means: a cluster born
                    without a field may still gain it, and from then
                    on the field holds. (oldSelf is the right
                    comparison here. The Machine's grow-only storage
                    rules compare against status instead, precisely
                    so that a declared size the machine could not
                    satisfy can be edited back down to reality. These
                    fields need no such escape, because their real
                    values never change, so there is never a failed
                    declaration to walk back.)
                  properties:
                    nodeCIDR:
                      type: string
                      maxLength: 64
                      pattern: ^[0-9a-fA-F:.]+/[0-9]{1,3}$
                      description: >-
                        The subnet the nodes address each other on.
                        The machine's interface whose address falls
                        inside this subnet carries cluster traffic,
                        and that address becomes the machine's node
                        IP.
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: nodeCIDR is immutable once set; re-addressing the node network means new Machine manifests, not a Cluster edit
                    clusterCIDR:
                      type: string
                      maxLength: 64
                      pattern: ^[0-9a-fA-F:.]+/[0-9]{1,3}$
                      description: >-
                        The range pod addresses are drawn from
                        (k3s default 10.42.0.0/16).
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: clusterCIDR is immutable once set; k3s cannot renumber pod addresses on a live cluster
                    serviceCIDR:
                      type: string
                      maxLength: 64
                      pattern: ^[0-9a-fA-F:.]+/[0-9]{1,3}$
                      description: >-
                        The range service addresses are drawn from
                        (k3s default 10.43.0.0/16).
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: serviceCIDR is immutable once set; k3s cannot renumber service addresses on a live cluster
                    clusterDNS:
                      type: string
                      maxLength: 64
                      pattern: ^[0-9a-fA-F:.]+$
                      description: >-
                        The service address of the cluster's DNS
                        resolver, inside serviceCIDR (k3s default
                        10.43.0.10).
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: clusterDNS is immutable once set; every pod's resolv.conf already points at it
                    clusterDomain:
                      type: string
                      maxLength: 253
                      description: >-
                        The DNS suffix cluster-internal names live
                        under (k3s default cluster.local).
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: clusterDomain is immutable once set; certificates and service names throughout the cluster embed it
                time:
                  type: object
                  description: >-
                    The cluster's time hierarchy: where the leaders
                    get their time. Only the leaders consult it.
                    Followers sync from the leaders themselves, so
                    time flows upstreams, then leaders, then everyone
                    else.
                  properties:
                    upstreams:
                      type: array
                      # Atomic: source order is preference order.
                      x-kubernetes-list-type: atomic
                      description: >-
                        The NTP servers the cluster's servers sync
                        from, as hostnames or addresses. There is no
                        default, on purpose: volunteering a
                        deployment's machines to a public pool is the
                        deployment's choice to make. Empty means the
                        fleet free-runs. The machines stay consistent
                        with each other, but they are correct only if
                        the hardware clocks happen to be correct too.
                      items:
                        type: string
                        maxLength: 253
                disruption:
                  type: object
                  description: >-
                    How much of the fleet may be down at once when the
                    cluster sequences reboots: the machine-level
                    equivalent of a workload's PodDisruptionBudget,
                    reduced to one number. Staged changes that need a
                    reboot wait for the cluster to grant each machine
                    a turn (a RebootApproved condition written onto
                    the Machine), and this budget is how many turns
                    may be outstanding. The count includes machines
                    that are down for any other reason, so a fleet
                    that already has machines down pauses its own
                    rollout.
                  properties:
                    maxUnavailable:
                      type: integer
                      minimum: 1
                      default: 1
                      description: >-
                        How many machines may be unavailable at once,
                        planned and unplanned together. Defaults to
                        one, the safest rollout. The leaders keep a
                        stricter automatic floor that this number
                        cannot raise: only one leader is ever down at
                        a time, because the datastore keeps quorum
                        only while a majority of leaders is up, and
                        no policy setting can change that arithmetic.
                features:
                  type: object
                  description: >-
                    The cluster's opt-ins from liken's curated feature
                    vocabulary: optional capabilities that the fleet
                    as a whole offers, beyond the minimum viable
                    cluster. Keyed by feature slug. The key's presence
                    is the opt-in, and a feature's zero configuration
                    is {}. The vocabulary today has eight entries.
                    traefik is k3s's bundled ingress controller.
                    servicelb is klipper-lb, which realizes Services
                    of type LoadBalancer on the nodes' own addresses.
                    metrics-server is the aggregated API behind
                    `kubectl top`. helm is the Helm controller
                    embedded in the k3s server process, which renders
                    HelmChart resources into workloads. Declaring
                    traefik enables helm automatically, because k3s
                    deploys Traefik through exactly such a resource.
                    network-policy is the controller that turns
                    NetworkPolicy resources into packet filtering.
                    Without it, the API accepts those resources, but
                    nothing enforces them, which is the flannel CNI's
                    own behavior. iscsi is the host-side iSCSI
                    initiator: static open-iscsi binaries, the
                    iscsi_tcp kernel module, an initiator name
                    derived from each machine's name, and an iscsid
                    DaemonSet. This is the host contract that CSI
                    drivers like synology-csi depend on. nfs is the
                    NFSv4 client: a static mount.nfs and the nfsv4
                    kernel module, with no daemons, and v4 only.
                    flux is GitOps sync through Flux: the fleet's
                    declared state lives in a git repository, and
                    the cluster applies what the repository holds.
                    flux is the vocabulary's first parameterized
                    feature. Its repository parameter is required:
                    the git URL the fleet syncs from, for example
                    ssh://git@forge.example/fleet.git. Its path
                    (default ".") and branch (default "main")
                    parameters choose which part of the repository
                    this cluster syncs. The repository is expected
                    to be private, and the cluster mints its own
                    SSH deploy key: the private half never leaves
                    the cluster, and status.flux.publicKey carries
                    the half to register at the forge. The first
                    three features (traefik, servicelb,
                    metrics-server) are components the k3s binary
                    already bundles, and liken disables them by
                    default on principle: anything beyond the
                    control plane should be a declared, visible
                    workload, and declaring it here is that
                    declaration. Toggling a feature converges
                    like any other cluster edit, rolling through the
                    fleet as staged changes and granted reboots.
                  # The schema is a map with validation rules, rather
                  # than named per-slug properties, and this choice
                  # matters. Named properties look natural, but the
                  # API server prunes unknown fields before
                  # validation ever runs. A misspelled slug in a
                  # patch would then vanish silently, the exact
                  # failure a declared document exists to prevent,
                  # and a CEL rule could never see it. Map keys are
                  # never pruned, so the rules below run against
                  # exactly what was sent, and refuse the two
                  # mistakes by name. The parity test in
                  # machine/features_test.go holds the first rule's
                  # vocabulary to the table in cluster/features.go.
                  x-kubernetes-validations:
                    - rule: "self.all(slug, slug in ['traefik', 'servicelb', 'metrics-server', 'helm', 'network-policy', 'iscsi', 'nfs', 'flux'])"
                      message: >-
                        unknown feature; the vocabulary is
                        traefik, servicelb, metrics-server, helm,
                        network-policy, iscsi, nfs, flux
                    # The dyn() casts in the rules below are the same
                    # arrangement the registries mirror schema uses:
                    # CEL types these values as map(string, string),
                    # a type it refuses to compare with null at
                    # compile time, and the cast is what lets the
                    # null checks compile.
                    - rule: "self.all(slug, dyn(self[slug]) != null)"
                      message: >-
                        a null feature is neither enabled nor
                        disabled; presence is the opt-in, so write
                        {} to enable a feature or remove its key
                        entirely
                    # A parameterless feature's configuration must
                    # stay exactly {}. Without this rule, a patch
                    # guessing at {replicas: 2} would count as an
                    # opt-in, with the guess quietly ignored. The
                    # null guard keeps this rule from evaluating a
                    # null value; the rule above already refuses it
                    # with the better message.
                    - rule: "self.all(slug, dyn(self[slug]) == null || slug in ['flux'] || self[slug].size() == 0)"
                      message: >-
                        only flux takes parameters; every other
                        feature's configuration is exactly {}
                    # flux's shape: repository is required, and every
                    # parameter must be one the vocabulary defines.
                    - rule: "!('flux' in self) || dyn(self['flux']) == null || ('repository' in self['flux'] && self['flux'].all(param, param in ['repository', 'path', 'branch']))"
                      message: >-
                        flux requires the repository parameter (the
                        git URL the fleet syncs from), and its only
                        parameters are repository, path, and branch
                  additionalProperties:
                    type: object
                    # Nullable, so that an explicit null survives
                    # decoding long enough for the rule above to
                    # refuse it with a message. A non-nullable value
                    # here would be dropped by the decoder as if
                    # unset, before validation ever saw it, and a
                    # bare `traefik:` in hand-written YAML would
                    # quietly mean nothing.
                    nullable: true
                    # A feature's configuration is a map of string
                    # parameters, never a schema of named properties,
                    # for the same reason the features object itself
                    # is a map: the API server prunes unknown named
                    # properties before validation runs, so a
                    # misspelled parameter would vanish silently.
                    # Map keys are never pruned. Every parameter
                    # survives to the rules above, which refuse the
                    # mistakes by name. The parity test in
                    # cluster/features_test.go holds those rules to
                    # the vocabulary table in cluster/features.go.
                    additionalProperties:
                      type: string
                registries:
                  type: object
                  description: >-
                    How container images arrive on the fleet's
                    machines: mirror endpoints that containerd pulls
                    through, and k3s's embedded peer-to-peer registry
                    (Spegel). These are cluster facts, because any
                    node may be asked to pull any image. Credentials
                    are deliberately not here. A spec is public, so
                    credentials enter through the registry-credentials
                    Secret in liken-system (the shape `kubectl create
                    secret docker-registry` produces), which the
                    machine operator reads and delivers to each
                    machine. Like the features above, the system
                    reads registries only when the k3s process
                    starts, so an edit here converges by restarting
                    k3s in place on each machine. This restart is
                    sequenced through the same one-leader-at-a-time
                    turns as a reboot, but the machine, and its pods,
                    stay up.
                  properties:
                    mirrors:
                      type: object
                      maxProperties: 64
                      description: >-
                        Registry host, mapped to the endpoint URLs
                        containerd tries, in preference order, before
                        it falls back to the registry itself. The key
                        is the host as an image reference names it
                        (docker.io, registry.example:5000).
                      # The same nullable-plus-rule defense that the
                      # features map uses. The decoder drops a null
                      # value for a non-nullable field before
                      # validation ever runs, so without this
                      # defense, a bare `docker.io:` in hand-written
                      # YAML would quietly declare nothing. This
                      # map's values are arrays, which CEL types as
                      # list(string) and refuses to compare with null
                      # at compile time. (The features map's values
                      # type as dyn, so its rule compiles without
                      # help.) The dyn() cast is what lets the null
                      # check compile here.
                      x-kubernetes-validations:
                        - rule: "self.all(host, dyn(self[host]) != null && self[host].size() > 0)"
                          message: >-
                            a mirror must list at least one endpoint
                            URL; write the endpoints, or remove the
                            host entirely
                      additionalProperties:
                        type: array
                        nullable: true
                        # Order is preference order, whole-list
                        # replacement on apply.
                        x-kubernetes-list-type: atomic
                        maxItems: 16
                        items:
                          type: string
                          maxLength: 2048
                          pattern: ^https?://.+$
                    embedded:
                      type: boolean
                      description: >-
                        Turns on k3s's embedded registry mirror
                        (Spegel). Every node serves the images it
                        already holds to its peers, so a fleet pulls
                        each image over the uplink once, instead of
                        once per machine. Enabling it shares every
                        registry's images (the wildcard mirror entry
                        in registries.yaml). The declared mirrors
                        above keep their own entries either way.
            status:
              type: object
              description: >-
                What a reader can observe about the cluster as a
                whole. The leaders write it: each leader's operator
                sweeps the Machine list every pass and publishes what
                it found. Only the leaders can do this. A follower
                that can reach the API is, by definition, reaching a
                leader.
              properties:
                phase:
                  type: string
                  enum: [Ready, Updating, Degraded]
                  description: >-
                    The conditions below, rolled up into one word.
                    The system derives this value on every sweep, and
                    never stores it as truth of its own. Ready means
                    every machine is Ready. Updating means the only
                    machines not Ready are mid-transition: rebooting
                    into a change, waiting on one, or booting. This
                    is the expected shape of a Cluster edit rolling
                    through the fleet. Degraded means at least one
                    machine is Lost, Blocked, or otherwise unhealthy.
                    This field can never truthfully show one state:
                    quorum lost. Losing a majority of leaders takes
                    the API server down with it, so nobody is left to
                    write here. When quorum is lost, the signal is
                    that this status stops updating.
                observedGeneration:
                  type: integer
                  format: int64
                  minimum: 0
                  description: >-
                    The metadata.generation of the spec this status
                    judged, stamped by the sweep on every write. Each
                    condition carries the same stamp, but a client
                    that only asks "has the sweep seen my edit yet"
                    reads it here, at the top of status, where
                    Kubernetes controllers conventionally publish it.
                conditions:
                  type: array
                  # The same metav1.Condition schema that the
                  # Machine's conditions use: a map keyed by type,
                  # validated like the conditions on Pods and Nodes.
                  # The sweep maintains MachinesReady, which reports
                  # the headcount, and Progressing, which reports the
                  # rollout using the Deployment vocabulary (False
                  # means a rollout has stalled). Quorum margin and
                  # clock spread are candidates for later.
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status, reason, lastTransitionTime]
                    properties:
                      type:
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        minLength: 1
                        maxLength: 1024
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      message:
                        type: string
                        maxLength: 32768
                      lastTransitionTime:
                        type: string
                        format: date-time
                machines:
                  type: object
                  description: >-
                    The headcount: how many machines are fully
                    healthy (phase Ready, with a heartbeat recent
                    enough to count as current) out of how many
                    exist. The summary holds the same two numbers as
                    "4/5". The status stores this because a printer
                    column can read one field, but cannot combine
                    two.
                  properties:
                    ready:
                      type: integer
                    total:
                      type: integer
                    summary:
                      type: string
                flux:
                  type: object
                  description: >-
                    The flux feature's observable half. publicKey is
                    the fleet's deploy key: the public half, in the
                    authorized_keys form a forge accepts. The private
                    half never appears anywhere a person can read. The
                    cluster operator mints the pair into the
                    flux-system Secret when the feature is declared,
                    and publishes the public half here. Register it
                    at the forge as a deploy key with write access,
                    and the fleet syncs from then on. To rotate the
                    key, delete the flux-system Secret in the
                    flux-system namespace; the next sweep mints a
                    fresh pair, and this field shows the new half to
                    register.
                  properties:
                    publicKey:
                      type: string
                      maxLength: 4096
                releases:
                  type: object
                  description: >-
                    What the sweep observes about releases: the
                    catalog it was given, and the channel it polls.
                  properties:
                    newest:
                      type: string
                      maxLength: 64
                      description: >-
                        The catalog's highest version, derived by the
                        sweep so the NEWEST printer column can sit
                        next to VERSION without anyone doing version
                        arithmetic at the terminal.
                    available:
                      type: string
                      maxLength: 64
                      description: >-
                        The latest version the release channel itself
                        announces: the channel.yaml document at
                        spec.releases.source, polled lazily by the
                        fleet observer (the liken.sh/check-releases
                        annotation forces the next poll). Advisory
                        only. It may name a version the catalog does
                        not hold yet, and adopting it still means
                        committing a digest-pinned catalog entry.
