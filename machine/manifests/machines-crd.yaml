# The Machine API, declared to Kubernetes.
#
# A CustomResourceDefinition tells Kubernetes about a new resource
# type. When you apply this document, the API server starts to serve
# /apis/liken.sh/v1alpha1/machines. This includes storage, validation,
# watches, RBAC, and kubectl support, and it needs no written code.
# The schema below has the same shape as the Go types in the machine
# package. The descriptions appear in the output of
# `kubectl explain machine.spec`, so the API documents itself at the
# terminal.
#
# This file goes in /var/lib/rancher/k3s/server/manifests, the
# auto-deploy directory for k3s. k3s applies every file in this
# directory to the cluster at startup, and it re-applies a file each
# time the file changes. This is a small, built-in GitOps loop. It is
# the reason liken does not need a `kubectl apply` step anywhere.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # A CRD name always has the form <plural>.<group>. The group is a
  # DNS name that we own. This keeps different organizations' custom
  # "Machine" types from colliding with each other.
  name: machines.liken.sh
spec:
  group: liken.sh
  names:
    kind: Machine
    listKind: MachineList
    plural: machines
    singular: machine
    # `kubectl get liken` shows the whole OS layer at once, in the
    # same way that `kubectl get all` shows workloads.
    categories: [liken]
  # This resource is cluster-scoped, like Node: a machine underlies
  # the cluster and belongs to no namespace within it.
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      # The status subresource splits the object into two endpoints,
      # each with its own write path. An ordinary update cannot touch
      # status, and a status update cannot touch spec. This boundary
      # enforces the rule "spec is declared, status is observed". The
      # rule is not just a convention.
      subresources:
        status: {}
      # This section controls what `kubectl get machines` prints,
      # without -o yaml. Each column here shows a word on purpose,
      # not a boolean. A True/False value can say only whether
      # something is wrong. An enumerated state says what kind of
      # wrong condition exists and what would fix it.
      additionalPrinterColumns:
        - name: Role
          type: string
          jsonPath: .status.role
        # This column summarizes the machine's state in one word (see
        # status.phase below). The Ready condition still exists for
        # programs, but a person who scans a fleet listing looks at
        # the phase.
        - name: Status
          type: string
          jsonPath: .status.phase
        # kubectl computes Uptime at read time, in the same way it
        # computes the Age column: a date-typed column renders as the
        # time elapsed since its timestamp. Deriving this from
        # bootedAt keeps the value always current. A literal uptime
        # figure written into status would go stale the moment the
        # operator wrote it.
        - name: Uptime
          type: date
          jsonPath: .status.bootedAt
        - name: Address
          type: string
          jsonPath: .status.network.addresses[0]
        - name: Liken
          type: string
          jsonPath: .status.version.liken
        - name: Kernel
          type: string
          jsonPath: .status.version.kernel
        # These are the two convergence conditions, one per document.
        # Cluster shows the Cluster document (ClusterConverged); Spec
        # shows the Machine manifest (SpecConverged). Each column
        # shows the condition's *reason* rather than its True/False
        # value, because the reasons already form an enumerated
        # vocabulary that says why: Converged at rest, RebootPending
        # when a change waits on a Manual reboot, RejectedLastBoot
        # when an edit was quarantined, and so on.
        - name: Cluster
          type: string
          jsonPath: .status.conditions[?(@.type=="ClusterConverged")].reason
        - name: Spec
          type: string
          jsonPath: .status.conditions[?(@.type=="SpecConverged")].reason
        # This shows the clock's state: Synchronized, FreeRunning (no
        # upstream sources declared, by design), or Unsynchronized
        # (sources declared but unreachable, which is an outage). It
        # also shows the measured offset from the last exchange.
        - name: Time
          type: string
          jsonPath: .status.time.state
        - name: Offset
          type: string
          jsonPath: .status.time.offset
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            A Machine is one computer that runs liken. It holds the
            declared state of the operating system beneath this
            cluster, and the observed facts about the hardware the
            operating system runs on.
          # This section defines admission-time validation, run by
          # the API server itself. Partition sizes are grow-only. The
          # invariant is about the disk, not the history of the spec:
          # a role may not be declared smaller than the size the
          # machine last booted with, and status.boot.storage records
          # that size. Comparing spec against status, rather than
          # against the spec's previous value with oldSelf, keeps an
          # edit reversible. A size that the machine turned out
          # unable to satisfy can be edited back down to the size
          # actually on disk, because that edit does not shrink
          # anything real. These rules live at the root of the schema
          # because they need to see both spec and status.
          #
          # CEL cannot see the machine itself, so this is one of
          # three places where the system enforces the same rule. A
          # spec that passes admission can still be refused by the
          # operator before staging, because the operator checks
          # against the real disk inventory. Init also never shrinks
          # anything at boot.
          #
          # Note the method form used for comparison: Kubernetes
          # Quantity values do not support the >= operator in CEL,
          # only isLessThan and similar methods.
          x-kubernetes-validations:
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.biosBoot) || !has(self.spec.storage.biosBoot.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.biosBoot) || !has(self.status.boot.storage.biosBoot.size) ||
                !quantity(self.spec.storage.biosBoot.size).isLessThan(quantity(self.status.boot.storage.biosBoot.size))
              message: biosBoot may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.bootHome) || !has(self.spec.storage.bootHome.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.bootHome) || !has(self.status.boot.storage.bootHome.size) ||
                !quantity(self.spec.storage.bootHome.size).isLessThan(quantity(self.status.boot.storage.bootHome.size))
              message: bootHome may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.systemA) || !has(self.spec.storage.systemA.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.systemA) || !has(self.status.boot.storage.systemA.size) ||
                !quantity(self.spec.storage.systemA.size).isLessThan(quantity(self.status.boot.storage.systemA.size))
              message: systemA may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.systemB) || !has(self.spec.storage.systemB.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.systemB) || !has(self.status.boot.storage.systemB.size) ||
                !quantity(self.spec.storage.systemB.size).isLessThan(quantity(self.status.boot.storage.systemB.size))
              message: systemB may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.machineState) || !has(self.spec.storage.machineState.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.machineState) || !has(self.status.boot.storage.machineState.size) ||
                !quantity(self.spec.storage.machineState.size).isLessThan(quantity(self.status.boot.storage.machineState.size))
              message: machineState may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.machineEphemeral) || !has(self.spec.storage.machineEphemeral.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.machineEphemeral) || !has(self.status.boot.storage.machineEphemeral.size) ||
                !quantity(self.spec.storage.machineEphemeral.size).isLessThan(quantity(self.status.boot.storage.machineEphemeral.size))
              message: machineEphemeral may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.clusterState) || !has(self.spec.storage.clusterState.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.clusterState) || !has(self.status.boot.storage.clusterState.size) ||
                !quantity(self.spec.storage.clusterState.size).isLessThan(quantity(self.status.boot.storage.clusterState.size))
              message: clusterState may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.podStorage) || !has(self.spec.storage.podStorage.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.podStorage) || !has(self.status.boot.storage.podStorage.size) ||
                !quantity(self.spec.storage.podStorage.size).isLessThan(quantity(self.status.boot.storage.podStorage.size))
              message: podStorage may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.podEphemeral) || !has(self.spec.storage.podEphemeral.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.podEphemeral) || !has(self.status.boot.storage.podEphemeral.size) ||
                !quantity(self.spec.storage.podEphemeral.size).isLessThan(quantity(self.status.boot.storage.podEphemeral.size))
              message: podEphemeral may not shrink below the size this machine booted with; partitions are grow-only
          properties:
            spec:
              type: object
              description: >-
                The declared state of this machine. Fields differ in
                when they take effect. Init reads network at boot.
                The liken operator applies sysctls and nodeLabels at
                boot and also reconciles them live. Storage and
                modules are staged, and they take effect at the next
                boot.
              properties:
                network:
                  type: object
                  description: >-
                    The machine's network configuration. When empty,
                    it means the default: DHCP on the first interface
                    that looks like real hardware. Init applies this
                    at boot; a change made in-cluster takes effect at
                    the next boot.
                  properties:
                    interfaces:
                      type: array
                      description: >-
                        Configures the machine's interfaces
                        explicitly, each by its kernel name. A
                        clustered machine typically declares two
                        interfaces: a DHCP uplink, and the
                        cluster-facing interface with the static
                        address its peers were told to find it at.
                      # This is one entry per interface: a map keyed
                      # by name. The API server can now enforce this
                      # instead of trusting the caller.
                      x-kubernetes-list-type: map
                      x-kubernetes-list-map-keys: [name]
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                            description: >-
                              The interface to configure, named as
                              the kernel names it (for example,
                              eth1).
                          address:
                            type: string
                            maxLength: 64
                            pattern: ^[0-9a-fA-F:.]+/[0-9]{1,3}$
                            description: >-
                              A static address in CIDR form
                              (10.10.0.1/24). The kernel learns the
                              subnet from the prefix length. When
                              empty, it means DHCP on this interface.
                          gateway:
                            type: string
                            maxLength: 64
                            pattern: ^[0-9a-fA-F:.]+$
                            description: >-
                              Makes this interface the default route.
                              This field is optional even for static
                              addresses, because a DHCP lease
                              elsewhere may supply the route.
                          nameservers:
                            type: array
                            # This list is atomic: nameserver order is
                            # preference order, so the list replaces
                            # as a whole.
                            x-kubernetes-list-type: atomic
                            items:
                              type: string
                              maxLength: 253
                sysctls:
                  type: object
                  description: >-
                    Kernel tuning values, from a parameter name to its
                    desired value, for example vm.overcommit_memory:
                    "1". Init applies these at boot, and the liken
                    operator re-asserts them continuously, so an edit
                    here takes effect without a reboot.
                  additionalProperties:
                    type: string
                modules:
                  type: array
                  description: >-
                    Extra kernel modules that this machine loads at
                    boot, beyond the fixed list the OS itself needs.
                    These are the drivers for whatever hardware this
                    machine's workloads use. The image build ships
                    the union of every machine's declared modules, so
                    a module declared here is loadable only if the
                    booted image was built from manifests that
                    declared it. status.modules reports each name's
                    outcome either way. Admission checks the shape
                    only, because only the build (for baked
                    manifests) and the boot (for later edits) can
                    know whether a name exists.
                  # This is a set: order carries no meaning, and the
                  # API server can refuse duplicates instead of
                  # trusting the caller.
                  x-kubernetes-list-type: set
                  maxItems: 64
                  items:
                    type: string
                    maxLength: 64
                    pattern: ^[A-Za-z0-9][A-Za-z0-9_-]*$
                nodeLabels:
                  type: object
                  maxProperties: 64
                  description: >-
                    This machine's scheduling identity: the labels
                    that its Node object carries. Workloads select on
                    these labels, for example to find which machine
                    has the GPU or which one sits on battery-backed
                    power. The system renders these labels into the
                    k3s boot configuration, so the node registers
                    already wearing them. The liken operator then
                    reconciles them live, including removing a label
                    that this spec retracts, which the kubelet never
                    does on its own. The system never touches labels
                    applied outside this spec.
                  # Three admission rules stand between a label edit
                  # and a machine that will not boot. Registration
                  # labels pass through the kubelet. Under the
                  # NodeRestriction admission plugin, which k3s
                  # enables, a kubelet given a kubernetes.io or
                  # k8s.io label outside its own allowlist refuses to
                  # start at all. So admission refuses exactly what
                  # would take the machine down, and it permits
                  # exactly what the kubelet permits itself: the
                  # well-known identity labels (hostname, arch, os,
                  # the topology pair, instance-type) and anything in
                  # the kubelet.kubernetes.io and node.kubernetes.io
                  # namespaces. Admission refuses the liken.sh
                  # namespace because the OS owns it: the static
                  # config stamps liken.sh/machine, and a spec that
                  # fights the OS over its own vocabulary (or over
                  # node-role, which demotion cleanup reads) has no
                  # good outcome.
                  x-kubernetes-validations:
                    - rule: >-
                        self.all(key, key.size() <= 317 && key.matches('^([a-z0-9]([-a-z0-9]*[a-z0-9])?([.][a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?[A-Za-z0-9]([-A-Za-z0-9_.]*[A-Za-z0-9])?$'))
                      message: >-
                        label keys are an optional DNS-style prefix, a
                        slash, and a name of letters, digits, dashes,
                        underscores, and dots
                    - rule: >-
                        self.all(key, !key.matches('^([^/]*[.])?(kubernetes[.]io|k8s[.]io)/') ||
                        key in ['kubernetes.io/hostname', 'kubernetes.io/arch', 'kubernetes.io/os', 'topology.kubernetes.io/region', 'topology.kubernetes.io/zone'] ||
                        key.matches('^([^/]*[.])?(kubelet[.]kubernetes[.]io|node[.]kubernetes[.]io)/'))
                      message: >-
                        the kubernetes.io and k8s.io namespaces belong to
                        Kubernetes, and the kubelet would refuse to start
                        with them; only the kubelet's own self-label
                        vocabulary is allowed (hostname, arch, os,
                        topology.kubernetes.io zone and region, and the
                        kubelet.kubernetes.io and node.kubernetes.io
                        namespaces)
                    - rule: >-
                        self.all(key, !key.matches('^([^/]*[.])?liken[.]sh/'))
                      message: >-
                        the liken.sh namespace belongs to the operating
                        system; it stamps its own labels
                  additionalProperties:
                    type: string
                    maxLength: 63
                    pattern: ^(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])?$
                rebootPolicy:
                  type: string
                  enum: [Auto, Manual]
                  default: Manual
                  description: >-
                    What the operator may do when applying the spec
                    requires a reboot (today, this means any storage
                    change). Manual, the default, stages the change
                    to the machineState filesystem and reports
                    RebootPending; the next boot applies it. Auto
                    lets the operator reboot the machine itself.
                storage:
                  type: object
                  description: >-
                    Assigns storage roles to disks. Each role is a
                    singleton field (a machine has one cluster state,
                    one pod-storage pool). Each role names the device
                    it lives on and, when it shares a disk, how much
                    of the disk to take; one role per disk may omit
                    its size and take the remainder. Init applies
                    this at boot, before k3s. The system reads the
                    device path only on the boot that claims a blank
                    disk. After that, the system recognizes the
                    role's partition by the GPT partition name
                    written on it. Edits here are staged, and they
                    take effect at the next boot. If a staged spec
                    cannot be satisfied, the system quarantines it,
                    and the machine boots its last proven spec
                    instead. Only a machine with no proven spec to
                    fall back to stops the boot. The machine's RAM
                    root backs any role absent from the spec.
                  properties:
                    biosBoot:
                      type: object
                      description: >-
                        When a machine declares this role, together
                        with bootHome, it says that it boots
                        BIOS-style, through liken's own GRUB, rather
                        than through UEFI firmware. This is a tiny
                        raw partition, about 1Mi in size, with no
                        filesystem. It holds GRUB's core image, the
                        code that the MBR's 440 boot bytes jump into.
                        Its size is fixed once claimed, because the
                        MBR refers to it by literal sector numbers.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    bootHome:
                      type: object
                      description: >-
                        The other half of the BIOS boot declaration.
                        This is a small FAT32 partition, about 64Mi
                        in size, that holds GRUB's configuration and
                        its environment block. The environment block
                        is the file that holds the boot variables
                        that UEFI firmware would otherwise have
                        provided. It lives on neither system slot, so
                        the system can write both slots freely while
                        the boot machinery keeps its own separate
                        space.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    systemA:
                      type: object
                      description: >-
                        The first of the operating system's two boot
                        slots. Each slot holds one complete liken
                        version. The machine runs from one slot while
                        the system writes upgrades to the other. The
                        slots are EFI system partitions that carry
                        FAT32, because the firmware itself is the
                        first reader of each slot. Their size is
                        fixed once claimed, because FAT32 does not
                        grow in place.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    systemB:
                      type: object
                      description: >-
                        The second boot slot. The systemA description
                        explains how the two slots work.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    machineState:
                      type: object
                      description: >-
                        The machine's own durable data, chiefly the
                        staged and proven manifests. These manifests
                        let a spec edit survive a reboot and apply at
                        the next one. This role comes first among the
                        data roles in the canonical partition order,
                        so a future boot can find it before it has
                        read any spec.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    machineEphemeral:
                      type: object
                      description: >-
                        The operating system's own scratch space (/tmp).
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    clusterState:
                      type: object
                      description: >-
                        k3s's state: its database, TLS material, and
                        containerd's images. Because the system keeps
                        this data, a reboot can resume the same
                        cluster instead of starting a new one.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    podStorage:
                      type: object
                      description: >-
                        Durable storage that pods claim by name: the
                        PersistentVolumeClaim pool. The local-path
                        provisioner serves this pool.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    podEphemeral:
                      type: object
                      description: >-
                        kubelet's working space: emptyDir volumes and
                        per-pod scratch, the pool that pods meter with
                        ephemeral-storage requests and limits.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
            status:
              type: object
              description: >-
                What the machine observed about itself. Init writes
                this through the facts file, and the liken operator
                publishes it. The system re-derives everything here
                on every reconcile pass; it remembers nothing. So
                this reports what currently holds, not what once
                held.
              properties:
                phase:
                  type: string
                  enum: [Unknown, Booting, Lost, Blocked, Updating, UpdatePending, Degraded, Ready]
                  description: >-
                    The machine's state in one word. The system
                    derives this from the conditions on every
                    reconcile pass, so the phase can never disagree
                    with them. Ready means every condition holds.
                    UpdatePending and Updating mean a staged change
                    is waiting on a reboot (Manual) or is in flight
                    (Auto). Blocked means drift exists that liken
                    refuses to stage or cannot stage; this state
                    needs a different edit, not time. Degraded covers
                    everything else that is wrong. Booting means
                    init has not finished publishing this boot.
                    Unknown means the operator cannot read the
                    machine's facts at all. Lost is the exception to
                    self-reporting: a leader writes this value when
                    this machine's heartbeat lease (in liken-system)
                    goes silent, because a dead machine cannot report
                    its own failure.
                role:
                  type: string
                  description: >-
                    What this machine is in its cluster: a leader
                    (it runs a control plane) or a follower (it runs
                    workloads). The system derives this at boot from
                    the Cluster manifest's leaders list. No one
                    declares this field directly.
                version:
                  type: object
                  description: >-
                    The complete inventory of what this machine runs:
                    liken's own version and every outside component
                    the OS carries. The system observes the kernel
                    and xtables versions on the running machine. The
                    rest report from the components record that the
                    image build staged beside the bytes, the same
                    pins that the release document publishes. k3s
                    appears here and also on the Node object, because
                    the two answer different questions: the Node
                    reports the running kubelet, and this reports
                    what the OS image carried.
                  properties:
                    liken:
                      type: string
                    kernel:
                      type: string
                    xtables:
                      type: string
                      description: >-
                        The netfilter userspace, as iptables -V
                        reports it: version and variant (legacy or
                        nft).
                    k3s:
