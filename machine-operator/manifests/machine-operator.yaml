# The machine operator's deployment: everything the program in this
# directory needs to exist in the cluster. Like the CRDs, this file is
# applied by k3s from its auto-deploy manifests directory at every
# startup.
#
# The image reference below is the airgapped one: image/build.sh
# ships the operator as an OCI tarball inside the initramfs, k3s
# imports it into containerd at start, and imagePullPolicy: Never
# guarantees this machine never contacts a registry to run its own OS
# components. LIKEN_VERSION is substituted with the real version when
# the image is assembled.
#
# That arrangement makes the operator's image part of the OS, and the
# DaemonSet below is shaped around the consequence: a node can only
# run the operator its own OS carries. In a fleet mid-upgrade the
# nodes carry different versions, and any leader's k3s re-applies
# this file at startup, so the template must never demand an image
# some node doesn't have. See the DaemonSet's own comments and
# cluster-operator/steward.go for how the pieces fit.
---
# The ServiceAccount is the machine operator's identity: kubelet
# mounts a token for it into the pod, and every API request the
# operator makes carries it. See the kubernetes package for the
# client half.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: liken-machine-operator
  namespace: liken-system
---
# The machine operator's permissions, and deliberately nothing more.
# This program is powerful on the machine it stands on (the pod spec
# below is privileged) and correspondingly narrow in the cluster: it
# reads and writes its own Machine, seeds the Cluster, and touches
# its own Node. Everything fleet-shaped — other machines' statuses,
# the Cluster's status, the OS pods on other nodes — belongs to the
# cluster operator's role, not this one, so a compromised or confused
# machine operator cannot rewrite the fleet's story. RBAC can grant
# spec and status separately precisely because both CRDs declare
# status as a subresource. Note what's absent for clusters: no update
# on the resource itself, and no update on its status either. The
# operator seeds the Cluster once and may never rewrite the spec a
# person (or one day a git repository) edits afterward; the status is
# the cluster operator's to write.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: liken-machine-operator
rules:
  # Its own Machine: read it, watch it, create it on first boot. The
  # verbs cover the whole collection because RBAC has no way to say
  # "only the Machine named for your node" (resourceNames can't be
  # templated per pod), but the program only ever watches its own
  # object, by fieldSelector.
  - apiGroups: [liken.sh]
    resources: [machines]
    verbs: [get, list, watch, create]
  - apiGroups: [liken.sh]
    resources: [machines/status]
    verbs: [update]
  # The Cluster: seed it from the image's manifest and read it back
  # every pass for document convergence. No list or watch: the boot
  # manifest names the one cluster this machine belongs to.
  - apiGroups: [liken.sh]
    resources: [clusters]
    verbs: [get, create]
  # Nodes: get to see role labels and cordon state, delete for
  # demotion cleanup (demotion.go; deleting the stale Node is what
  # triggers k3s's etcd member removal), and patch for the drain's
  # cordon and uncordon (drain.go) and for the spec's node labels
  # (labels.go). Patch rather than update, deliberately: the operator
  # touches only the fields it owns (the unschedulable flag, the
  # labels the spec declares, its own annotations) and never rewrites
  # a whole Node.
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, delete, patch]
  # The drain (drain.go): list to see what still runs on this
  # machine's node, and create on the eviction subresource to ask
  # each pod to leave. Eviction-by-subresource rather than pod
  # delete, deliberately: an eviction is refused while it would
  # violate the workload's PodDisruptionBudget, which is the entire
  # difference between draining a node and killing it.
  - apiGroups: [""]
    resources: [pods]
    verbs: [list]
  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: liken-machine-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: liken-machine-operator
subjects:
  - kind: ServiceAccount
    name: liken-machine-operator
    namespace: liken-system
---
# The heartbeat lease (the kubernetes package): each machine's
# operator creates and renews the one Lease named for its machine,
# the way a kubelet is the only writer of its node lease. No list,
# deliberately: renewing your own heartbeat never requires seeing
# anyone else's, and reading the fleet's liveness is the cluster
# operator's job. A namespaced Role rather than another ClusterRole
# rule, also deliberately: leases exist all over a cluster (every
# kubelet heartbeats through one in kube-node-lease), and the
# operator has no business with any lease outside liken's own
# namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: liken-machine-operator-leases
  namespace: liken-system
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, create, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: liken-machine-operator-leases
  namespace: liken-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: liken-machine-operator-leases
subjects:
  - kind: ServiceAccount
    name: liken-machine-operator
    namespace: liken-system
---
# A DaemonSet rather than a Deployment because the machine operator's
# job is node-local by nature: each pod manages the machine it stands
# on. Contrast cluster-operator/manifests/cluster-operator.yaml,
# whose job is fleet-wide and runs as an ordinary Deployment.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: liken-machine-operator
  namespace: liken-system
  # The recommended app.kubernetes.io labels, for every tool that
  # keys on them. The selector below stays the minimal app: label,
  # because a DaemonSet's selector is immutable after creation and
  # should carry identity only, never anything that might want to
  # change.
  labels:
    app.kubernetes.io/name: liken-machine-operator
    app.kubernetes.io/part-of: liken
  # The release these manifests shipped with. The pod steward
  # (cluster-operator/steward.go) compares this against each
  # machine's running version to know when a machine is ready for a
  # pod from this template. This annotation is the authority, the
  # pods below inherit it, and a pod is stale exactly when its
  # inherited copy differs from the DaemonSet's.
  annotations:
    liken.sh/os-version: "LIKEN_VERSION"
spec:
  selector:
    matchLabels:
      app: liken-machine-operator
  # OnDelete, never a rolling update: the image is baked into each
  # node's OS, so a template change must not recreate pods on nodes
  # that haven't rebooted into the release that carries it. Doing so
  # would kill the one operator a machine needs to drive its own
  # upgrade, and imagePullPolicy: Never means the replacement could
  # never start. Pods are refreshed by the steward, one machine at a
  # time, only after each machine's own upgrade lands.
  updateStrategy:
    type: OnDelete
  template:
    metadata:
      labels:
        app: liken-machine-operator
        app.kubernetes.io/name: liken-machine-operator
        app.kubernetes.io/part-of: liken
      annotations:
        liken.sh/os-version: "LIKEN_VERSION"
    spec:
      serviceAccountName: liken-machine-operator
      # The OS layer should outrank workloads when memory gets tight;
      # this is the same priority class kube-proxy and CNI pods use.
      priorityClassName: system-node-critical
      # Only liken nodes run liken's OS components. Every liken
      # machine registers with this label (image/etc/rancher/k3s); a
      # node without it belongs to the cluster but not to the fleet,
      # which happens during a migration, when liken machines and
      # the nodes they are replacing share one cluster. Without this
      # selector the pod would be scheduled there and sit in
      # ErrImageNeverPull forever, since the image below exists only
      # in a liken machine's containerd.
      nodeSelector:
        liken.sh/machine: "true"
      # Manage the machine even while its node is cordoned or not yet
      # ready, exactly the moments an OS operator matters most.
      tolerations:
        - operator: Exists
      # This pod deliberately gives up most of a container's isolation,
      # because it manages the machine itself. hostNetwork puts it in
      # the host's network namespace, so the net.* sysctls it writes
      # tune the real stack, not a pod-private copy; privileged makes
      # the container's /proc/sys writable (unprivileged pods get it
      # read-only). The RBAC above bounds the trade: the pod is
      # powerful on this machine but narrow in the cluster.
      hostNetwork: true
      containers:
        - name: operator
          # The stable tag: every release tags its own operator build
          # liken.sh/machine-operator:installed (the Makefile here
          # runs image/oci.sh), so this same pod spec resolves to
          # whatever build each node's OS imported, and applying a
          # new release's manifests never changes the image field at
          # all. A versioned tag here would demand one specific build
          # on every node at once, which a fleet mid-upgrade cannot
          # satisfy.
          image: liken.sh/machine-operator:installed
          imagePullPolicy: Never
          securityContext:
            privileged: true
          volumeMounts:
            # These are the operator's inputs: the facts init
            # published and, beside them, the manifest this boot ran
            # under (which tells the operator which Machine it
            # manages). Read-only by mount rather than by convention:
            # status is observed, never asserted, and the operator
            # cannot rewrite its own input.
            - name: run-liken
              mountPath: /run/liken
              readOnly: true
            # The cluster manifest the image carries, to seed the
            # in-cluster Cluster on first boot.
            - name: etc-liken
              mountPath: /etc/liken
              readOnly: true
            # The machineState filesystem, where the operator stages a
            # manifest for the next boot: its one output channel to
            # the init program of the next boot.
            - name: machine-state
              mountPath: /var/lib/liken/machine
            # The reboot channel: a subdirectory of /run/liken the
            # operator may write while the facts above stay behind a
            # read-only mount. There are two mounts because data flows
            # in two directions: facts flow from init to the operator,
            # and intents flow from the operator to init.
            - name: run-liken-operator
              mountPath: /run/liken/operator
            # The system slots, where downloaded releases land: the
            # operator writes the inactive slot's filesystem (init
            # mounted both under here at boot). Writable because the
            # download is itself the actuation, for the same reason
            # machine-state is writable.
            - name: system-slots
              mountPath: /var/lib/liken/system
      # Staging and rebooting need no RBAC at all: they are
      # host-filesystem acts, bounded by these mounts rather than by
      # cluster permissions.
      volumes:
        - name: run-liken
          hostPath:
            path: /run/liken
        - name: etc-liken
          hostPath:
            path: /etc/liken
        # DirectoryOrCreate because these paths only exist as real
        # mounts/directories when init created them; the default type
        # would fail the pod outright on a machine without them, while
        # the operator prefers to start and report (the facts say
        # whether machineState is really a disk).
        - name: machine-state
          hostPath:
            path: /var/lib/liken/machine
            type: DirectoryOrCreate
        - name: run-liken-operator
          hostPath:
            path: /run/liken/operator
            type: DirectoryOrCreate
        - name: system-slots
          hostPath:
            path: /var/lib/liken/system
            type: DirectoryOrCreate
