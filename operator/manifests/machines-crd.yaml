# The Machine API, declared to Kubernetes.
#
# A CustomResourceDefinition is how Kubernetes learns a new resource
# type: apply this document and the API server starts serving
# /apis/liken.sh/v1alpha1/machines, with storage, validation, watches,
# RBAC and kubectl support included and no code written. The schema below
# is the same shape as the Go types in the machine package; the
# descriptions surface in `kubectl explain machine.spec`, which makes
# the API self-documenting at the terminal.
#
# This file lands in /var/lib/rancher/k3s/server/manifests, k3s's
# auto-deploy directory: everything there is applied to the cluster at
# startup and re-applied whenever the file changes: a tiny, built-in
# GitOps loop, and the reason liken needs no `kubectl apply` step
# anywhere.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # CRD names are always <plural>.<group>; the group is a DNS name we
  # own, which is what keeps different organizations' custom "Machine"
  # types from colliding.
  name: machines.liken.sh
spec:
  group: liken.sh
  names:
    kind: Machine
    listKind: MachineList
    plural: machines
    singular: machine
  # Cluster-scoped, like Node: a machine underlies the cluster and
  # belongs to no namespace within it.
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      # The status subresource splits the object into two endpoints
      # with separate write paths: ordinary updates cannot touch
      # status, and status updates cannot touch spec. That boundary is
      # what makes "spec is declared, status is observed" enforceable
      # rather than just a convention.
      subresources:
        status: {}
      # What `kubectl get machines` prints, without -o yaml.
      additionalPrinterColumns:
        - name: Address
          type: string
          jsonPath: .status.network.addresses[0]
        - name: Liken
          type: string
          jsonPath: .status.version.liken
        - name: Kernel
          type: string
          jsonPath: .status.version.kernel
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Converged
          type: string
          jsonPath: .status.conditions[?(@.type=="SpecConverged")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            A Machine is one computer running liken: the declared
            state of the operating system beneath this cluster, and
            the observed facts of the hardware it's running on.
          properties:
            spec:
              type: object
              description: >-
                The declared state of this machine. Fields differ in
                when they take effect: network is read by init at boot,
                sysctls are both applied at boot and reconciled live by
                the liken operator.
              properties:
                network:
                  type: object
                  description: >-
                    The machine's network configuration. Empty means the
                    default: DHCP on the first interface that looks like
                    real hardware. Applied by init at boot; changing it
                    in-cluster takes effect next boot.
                  properties:
                    interface:
                      type: string
                      description: >-
                        Pins network bring-up to a specific interface
                        name, e.g. eth1.
                sysctls:
                  type: object
                  description: >-
                    Kernel tuning, parameter name to desired value, e.g.
                    vm.overcommit_memory: "1". Applied by init at boot
                    and re-asserted continuously by the liken operator,
                    so an edit here takes effect without a reboot.
                  additionalProperties:
                    type: string
                rebootPolicy:
                  type: string
                  enum: [Auto, Manual]
                  default: Manual
                  description: >-
                    What the operator may do when applying the spec
                    requires a reboot (today: any storage change).
                    Manual, the default, stages the change to the
                    machineState filesystem and reports RebootPending;
                    any next boot applies it. Auto lets the operator
                    reboot the machine itself.
                storage:
                  type: object
                  description: >-
                    Assigns storage roles to disks. Each role is a
                    singleton field (a machine has one cluster state,
                    one pod-storage pool) naming the device it lives
                    on and, when sharing a disk, how much of it to
                    take; one role per disk may omit its size and take
                    the remainder. Applied by init at boot, before k3s.
                    The device path is consulted only on the boot that
                    claims a blank disk; from then on the role's
                    partition is recognized by the GPT partition name
                    written on it. Edits here are staged and take
                    effect at the next boot; a staged spec that can't
                    be satisfied is quarantined and the machine boots
                    its last proven spec instead, and only a machine
                    with no proven spec to fall back to stops the
                    boot. Roles absent from the spec are backed by the
                    machine's RAM root.
                  # Admission-time validation, run by the API server
                  # itself: sizes are grow-only, and the half of that
                  # rule that's visible in the object alone (this spec
                  # vs its previous self) is enforced here, before the
                  # edit is even accepted. Transition rules (the ones
                  # naming oldSelf) run only on UPDATE. What CEL cannot
                  # see is the machine: a size that shrinks a role
                  # relative to its *actual partition* (including
                  # giving a remainder role any fixed size at all) is
                  # refused by the operator before staging, and init
                  # itself never shrinks anything at boot. Three
                  # layers, one rule.
                  x-kubernetes-validations:
                    - rule: >-
                        !has(oldSelf.machineState) || !has(self.machineState) ||
                        !has(oldSelf.machineState.size) || !has(self.machineState.size) ||
                        quantity(self.machineState.size) >= quantity(oldSelf.machineState.size)
                      message: machineState may not shrink; storage roles are grow-only
                    - rule: >-
                        !has(oldSelf.machineEphemeral) || !has(self.machineEphemeral) ||
                        !has(oldSelf.machineEphemeral.size) || !has(self.machineEphemeral.size) ||
                        quantity(self.machineEphemeral.size) >= quantity(oldSelf.machineEphemeral.size)
                      message: machineEphemeral may not shrink; storage roles are grow-only
                    - rule: >-
                        !has(oldSelf.clusterState) || !has(self.clusterState) ||
                        !has(oldSelf.clusterState.size) || !has(self.clusterState.size) ||
                        quantity(self.clusterState.size) >= quantity(oldSelf.clusterState.size)
                      message: clusterState may not shrink; storage roles are grow-only
                    - rule: >-
                        !has(oldSelf.podStorage) || !has(self.podStorage) ||
                        !has(oldSelf.podStorage.size) || !has(self.podStorage.size) ||
                        quantity(self.podStorage.size) >= quantity(oldSelf.podStorage.size)
                      message: podStorage may not shrink; storage roles are grow-only
                    - rule: >-
                        !has(oldSelf.podEphemeral) || !has(self.podEphemeral) ||
                        !has(oldSelf.podEphemeral.size) || !has(self.podEphemeral.size) ||
                        quantity(self.podEphemeral.size) >= quantity(oldSelf.podEphemeral.size)
                      message: podEphemeral may not shrink; storage roles are grow-only
                  properties:
                    machineState:
                      type: object
                      description: >-
                        The machine's own durable data, chiefly the
                        staged and proven manifests that let a spec
                        edit survive a reboot and apply at the next
                        one. First in the canonical partition order,
                        so a future boot can find it before it has
                        read any spec.
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
                    machineEphemeral:
                      type: object
                      description: >-
                        The operating system's own scratch space (/tmp).
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
                    clusterState:
                      type: object
                      description: >-
                        k3s's state: its database, TLS material, and
                        containerd's images. Persisting this is what
                        lets a reboot resume the same cluster instead
                        of starting a new one.
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
                    podStorage:
                      type: object
                      description: >-
                        Durable storage pods claim by name: the
                        PersistentVolumeClaim pool, served by the
                        local-path provisioner.
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
                    podEphemeral:
                      type: object
                      description: >-
                        kubelet's working space: emptyDir volumes and
                        per-pod scratch, the pool that pods meter with
                        ephemeral-storage requests and limits.
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
            status:
              type: object
              description: >-
                What the machine observed about itself, written by init
                (via the facts file) and published by the liken
                operator. Everything here is re-derived on every
                reconcile pass (nothing is remembered), so it reports
                what currently holds, not what once did.
              properties:
                version:
                  type: object
                  description: >-
                    The software this machine runs. The k3s and kubelet
                    versions are reported on the built-in Node object;
                    this covers the layer beneath it.
                  properties:
                    liken:
                      type: string
                    kernel:
                      type: string
                    xtables:
                      type: string
                      description: >-
                        The netfilter userspace as iptables -V reports
                        it: version and variant (legacy vs nft).
                network:
                  type: object
                  description: The boot's DHCP outcome.
                  properties:
                    interface:
                      type: string
                    mac:
                      type: string
                    addresses:
                      type: array
                      items:
                        type: string
                    gateway:
                      type: string
                    nameservers:
                      type: array
                      items:
                        type: string
                    leaseExpires:
                      type: string
                      format: date-time
                hardware:
                  type: object
                  properties:
                    cpus:
                      type: integer
                    memoryBytes:
                      type: integer
                    blockDevices:
                      type: array
                      description: >-
                        The machine's storage inventory: every real disk
                        the kernel found, declared in the spec or not.
                        The name is the kernel's for this boot (assigned
                        in probe order, so a handle, not an identity);
                        the model and serial come from the device
                        itself.
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                          sizeBytes:
                            type: integer
                          model:
                            type: string
                          serial:
                            type: string
                storage:
                  type: object
                  description: >-
                    Where every storage role is actually backed this
                    boot, declared or not. The spec says what was asked
                    for and hardware.blockDevices says what's attached;
                    this connects the two. Memory-backed roles report
                    no capacity on purpose: they all share the one RAM
                    root, and per-role figures would count it multiple
                    times.
                  properties:
                    machineState:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                    machineEphemeral:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                    clusterState:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                    podStorage:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                    podEphemeral:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                actuation:
                  type: object
                  description: >-
                    Which manifest this boot actually ran under: the
                    staged one awaiting its proving boot, the proven
                    last-known-good, or (first boot only) the seed
                    baked into the image. The hash identifies the
                    manifest's exact bytes, and the storage block is
                    the spec as actuated: together they are the
                    reference point for detecting drift between what
                    the cluster asks and what the machine did. A
                    rejection reports a staged manifest that failed
                    its boot and was quarantined; it stands until a
                    different spec proves out.
                  properties:
                    manifestSource:
                      type: string
                      enum: [Staged, Proven, Seed]
                    manifestHash:
                      type: string
                    storage:
                      type: object
                      properties:
                        machineState:
                          type: object
                          properties:
                            device:
                              type: string
                            size:
                              type: string
                        machineEphemeral:
                          type: object
                          properties:
                            device:
                              type: string
                            size:
                              type: string
                        clusterState:
                          type: object
                          properties:
                            device:
                              type: string
                            size:
                              type: string
                        podStorage:
                          type: object
                          properties:
                            device:
                              type: string
                            size:
                              type: string
                        podEphemeral:
                          type: object
                          properties:
                            device:
                              type: string
                            size:
                              type: string
                    rejection:
                      type: object
                      properties:
                        hash:
                          type: string
                        reason:
                          type: string
                        rejectedAt:
                          type: string
                          format: date-time
                sysctls:
                  type: object
                  description: >-
                    The observed value of every parameter named in
                    spec.sysctls, read back from the kernel, so the
                    desired and actual values can be compared in one
                    place.
                  additionalProperties:
                    type: string
                bootedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
