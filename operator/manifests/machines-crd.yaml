# The Machine API, declared to Kubernetes.
#
# A CustomResourceDefinition is how Kubernetes learns a new noun: apply
# this document and the API server starts serving
# /apis/liken.sh/v1alpha1/machines — storage, validation, watches, RBAC
# and kubectl support included, with no code written. The schema below
# is the same shape as the Go types in the machine package; the
# descriptions surface in `kubectl explain machine.spec`, which makes
# the API self-documenting at the terminal.
#
# This file lands in /var/lib/rancher/k3s/server/manifests, k3s's
# auto-deploy directory: everything there is applied to the cluster at
# startup and re-applied whenever the file changes — a tiny, built-in
# GitOps loop, and the reason liken needs no `kubectl apply` step
# anywhere.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # CRD names are always <plural>.<group>; the group is a DNS name we
  # own, which is what keeps every organization's custom "Machine" from
  # colliding.
  name: machines.liken.sh
spec:
  group: liken.sh
  names:
    kind: Machine
    listKind: MachineList
    plural: machines
    singular: machine
  # Cluster-scoped, like Node: a machine underlies the cluster and
  # belongs to no namespace within it.
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      # The status subresource splits the object into two endpoints
      # with separate write paths: ordinary updates cannot touch
      # status, and status updates cannot touch spec. That boundary is
      # what makes "spec is declared, status is observed" enforceable
      # rather than just polite.
      subresources:
        status: {}
      # What `kubectl get machines` prints, without -o yaml.
      additionalPrinterColumns:
        - name: Address
          type: string
          jsonPath: .status.network.addresses[0]
        - name: Liken
          type: string
          jsonPath: .status.version.liken
        - name: Kernel
          type: string
          jsonPath: .status.version.kernel
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            A Machine is one computer running liken: the declared state
            of the operating system beneath this cluster, and the
            observed facts of the hardware it woke up on.
          properties:
            spec:
              type: object
              description: >-
                What this machine is asked to be. Fields differ in when
                they take effect: network is read by init at boot,
                sysctls are both applied at boot and reconciled live by
                the liken operator.
              properties:
                network:
                  type: object
                  description: >-
                    How the machine attaches to the world. Empty means
                    liken's default posture, DHCP on the first interface
                    that looks like real hardware. Applied by init at
                    boot; changing it in-cluster takes effect next boot.
                  properties:
                    interface:
                      type: string
                      description: >-
                        Pins network bring-up to a specific interface
                        name, e.g. eth1.
                sysctls:
                  type: object
                  description: >-
                    Kernel tuning, parameter name to desired value, e.g.
                    vm.overcommit_memory: "1". Applied by init at boot
                    and re-asserted continuously by the liken operator,
                    so an edit here takes effect without a reboot.
                  additionalProperties:
                    type: string
                storage:
                  type: object
                  description: >-
                    Places purposes onto disks. Each role is a
                    singleton field — a machine has one cluster state,
                    one pod-storage pool — naming the device it lives
                    on and, when sharing a disk, how much of it to
                    take; one role per disk may omit its size and take
                    the remainder. Applied by init at boot, before k3s.
                    The device path is consulted only on the boot that
                    claims a blank disk; from then on the role's
                    partition is recognized by the name stamped on it.
                    A declared role that can't be honored stops the
                    boot. Roles absent from the spec live on the
                    machine's RAM root.
                  properties:
                    clusterState:
                      type: object
                      description: >-
                        The cluster's world: k3s's state, its database,
                        and containerd's images — what makes a reboot
                        resume the same cluster instead of founding a
                        new one.
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
                    systemEphemeral:
                      type: object
                      description: >-
                        The operating system's own scratch space (/tmp).
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
                    podStorage:
                      type: object
                      description: >-
                        Durable storage pods claim by name: the
                        PersistentVolumeClaim pool, served by the
                        local-path provisioner.
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
                    podEphemeral:
                      type: object
                      description: >-
                        kubelet's working space: emptyDir volumes and
                        per-pod scratch, the pool pods meter with
                        ephemeral-storage requests and limits.
                      required: [device]
                      properties:
                        device:
                          type: string
                        size:
                          type: string
            status:
              type: object
              description: >-
                What the machine observed about itself. Everything here
                is re-derived on every reconcile pass — nothing is
                remembered — so it can be trusted as a report of what
                currently holds, written by init (via the facts file)
                and published by the liken operator.
              properties:
                version:
                  type: object
                  description: >-
                    What this machine runs. The k3s and kubelet versions
                    live on the built-in Node object; this covers the
                    layer beneath it.
                  properties:
                    liken:
                      type: string
                    kernel:
                      type: string
                    xtables:
                      type: string
                      description: >-
                        The netfilter userspace as iptables -V reports
                        it: version and variant (legacy vs nft).
                network:
                  type: object
                  description: The boot's DHCP outcome.
                  properties:
                    interface:
                      type: string
                    mac:
                      type: string
                    addresses:
                      type: array
                      items:
                        type: string
                    gateway:
                      type: string
                    nameservers:
                      type: array
                      items:
                        type: string
                    leaseExpires:
                      type: string
                      format: date-time
                hardware:
                  type: object
                  properties:
                    cpus:
                      type: integer
                    memoryBytes:
                      type: integer
                    blockDevices:
                      type: array
                      description: >-
                        The machine's storage inventory: every real disk
                        the kernel found, declared in the spec or not —
                        an attached-but-undeclared disk showing up here
                        is how you notice a drive you forgot about. The
                        name is the kernel's for this boot (assigned in
                        probe order, so a handle, not an identity); the
                        model and serial are the disk's own words about
                        itself.
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                          sizeBytes:
                            type: integer
                          model:
                            type: string
                          serial:
                            type: string
                storage:
                  type: object
                  description: >-
                    The landing table: where every storage role
                    actually lives this boot, declared or not. The
                    spec says what was asked, hardware.blockDevices
                    says what's attached; this is the verdict
                    connecting them. Memory-backed roles report no
                    capacity on purpose — they all share the one RAM
                    root, and per-role figures would count it multiple
                    times.
                  properties:
                    clusterState:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                    systemEphemeral:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                    podStorage:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                    podEphemeral:
                      type: object
                      properties:
                        backing:
                          type: string
                        device:
                          type: string
                        partition:
                          type: string
                        capacityBytes:
                          type: integer
                sysctls:
                  type: object
                  description: >-
                    The observed value of every parameter named in
                    spec.sysctls, read back from the kernel — spec and
                    reality, side by side.
                  additionalProperties:
                    type: string
                bootedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
