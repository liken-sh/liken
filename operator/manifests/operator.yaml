# The liken operator's deployment: everything the program in this
# directory needs to exist in the cluster. Like the CRD, this file is
# applied by k3s from its auto-deploy manifests directory at every
# startup.
#
# The image reference below is the airgapped one: image/build.sh ships
# the operator as an OCI tarball inside the initramfs, k3s imports it
# into containerd at start, and imagePullPolicy: Never guarantees this
# machine never contacts a registry to run its own OS components.
# LIKEN_VERSION is substituted with the real version when the image is
# assembled.
---
# A namespace of liken's own, so `kubectl get all -n liken-system`
# shows everything the OS runs in the cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: liken-system
---
# The ServiceAccount is the operator's identity: kubelet mounts a token
# for it into the pod, and every API request the operator makes carries
# it. See operator/apiclient.go for the client half.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: liken-operator
  namespace: liken-system
---
# The operator's permissions, and deliberately nothing more: full
# control of Machines and their status, creation of the Cluster it
# seeds, and Node get/delete for demotion cleanup. RBAC can grant
# spec and status separately precisely because the Machine CRD
# declares status as a subresource. Note what's absent for clusters:
# no update — the operator seeds the Cluster once and may never
# rewrite what a person (or one day a git repository) edits
# afterward.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: liken-operator
rules:
  - apiGroups: [liken.sh]
    resources: [machines]
    verbs: [get, list, watch, create]
  - apiGroups: [liken.sh]
    resources: [machines/status]
    verbs: [get, update]
  - apiGroups: [liken.sh]
    resources: [clusters]
    verbs: [get, list, watch, create]
  # Nodes, for demotion cleanup (demotion.go): a machine demoted from
  # leader to follower deletes its own stale Node object, which is
  # what triggers k3s's etcd member removal. get to see the stale
  # role labels, delete to finish the demotion, and never update —
  # the operator doesn't manage Nodes.
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: liken-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: liken-operator
subjects:
  - kind: ServiceAccount
    name: liken-operator
    namespace: liken-system
---
# A DaemonSet rather than a Deployment because the operator's job is
# node-local by nature: each pod manages the machine it stands on. On
# today's single-node cluster that's one pod; when liken grows to many
# machines, this same manifest puts an operator on each of them.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: liken-operator
  namespace: liken-system
spec:
  selector:
    matchLabels:
      app: liken-operator
  template:
    metadata:
      labels:
        app: liken-operator
    spec:
      serviceAccountName: liken-operator
      # The OS layer should outrank workloads when memory gets tight;
      # this is the same priority class kube-proxy and CNI pods use.
      priorityClassName: system-node-critical
      # Manage the machine even while its node is cordoned or not yet
      # ready, exactly the moments an OS operator matters most.
      tolerations:
        - operator: Exists
      # This pod deliberately gives up most of a container's isolation,
      # because it manages the machine itself. hostNetwork puts it in
      # the host's network namespace, so the net.* sysctls it writes
      # tune the real stack, not a pod-private copy; privileged makes
      # the container's /proc/sys writable (unprivileged pods get it
      # read-only). The RBAC above bounds the trade: powerful on this
      # machine, narrow in the cluster.
      hostNetwork: true
      containers:
        - name: operator
          image: liken.sh/operator:LIKEN_VERSION
          imagePullPolicy: Never
          securityContext:
            privileged: true
          volumeMounts:
            # The facts init published, and beside them the manifest
            # this boot ran under (which tells the operator which
            # Machine it manages): the operator's inputs. Read-only by
            # mount, not by convention: status is observed, never
            # asserted, and the operator cannot rewrite its own input.
            - name: run-liken
              mountPath: /run/liken
              readOnly: true
            # The cluster manifest the image carries, to seed the
            # in-cluster Cluster on first boot.
            - name: etc-liken
              mountPath: /etc/liken
              readOnly: true
            # The machineState filesystem, where the operator stages a
            # manifest for the next boot: its one output channel to
            # init's future self.
            - name: machine-state
              mountPath: /var/lib/liken/machine
            # The reboot channel: a subdirectory of /run/liken the
            # operator may write while the facts above stay behind a
            # read-only mount. Two mounts, two directions: facts flow
            # init to operator, intents flow operator to init.
            - name: run-liken-operator
              mountPath: /run/liken/operator
      # Note what this feature did NOT need: any new RBAC. Staging and
      # rebooting are host-filesystem acts, bounded by these mounts,
      # not cluster permissions.
      volumes:
        - name: run-liken
          hostPath:
            path: /run/liken
        - name: etc-liken
          hostPath:
            path: /etc/liken
        # DirectoryOrCreate because these paths only exist as real
        # mounts/directories when init created them; the default type
        # would fail the pod outright on a machine without them, while
        # the operator prefers to start and report (the facts say
        # whether machineState is really a disk).
        - name: machine-state
          hostPath:
            path: /var/lib/liken/machine
            type: DirectoryOrCreate
        - name: run-liken-operator
          hostPath:
            path: /run/liken/operator
            type: DirectoryOrCreate
