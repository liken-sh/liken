# This is the website deploy. A push that touches the site is a
# publish. The job regenerates the page's ConfigMap on the liken.sh
# cluster and rolls the deployment (make website-content does this
# whole task), then checks the served page byte for byte against what
# it shipped. Nothing here rebuilds an image or reboots a machine.
#
# The credential is WEBSITE_KUBECONFIG, delivered to the secret store
# by terraform and scoped to the website's namespace alone
# (liken.sh/website/manifests/deployer.yaml). So this workflow can
# rewrite the page and nothing else. It lands at the gitignored path
# that the ./kubectl wrapper already reads. Manifest changes are
# outside this credential's reach on purpose. Those changes deploy
# from a workstation with `make website`.
name: website

on:
  push:
    branches: [main]
    paths:
      - liken.sh/website/**
      - .github/workflows/website.yaml

permissions:
  contents: read

# Deploys run one at a time: two pushes in quick succession would
# otherwise race their rollouts, and the page check below needs
# nothing else to change while it runs.
concurrency:
  group: website

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: place the credential
        env:
          WEBSITE_KUBECONFIG: ${{ secrets.WEBSITE_KUBECONFIG }}
        run: |
          mkdir -p liken.sh/identity
          printf '%s' "$WEBSITE_KUBECONFIG" > liken.sh/identity/kubeconfig

      - run: make -C liken.sh website-content

      # This step proves the deploy the way a reader meets it: the
      # page served over the public name is exactly the file that this
      # commit carries.
      - name: verify the served page
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 \
            https://liken.sh -o served.html
          cmp served.html liken.sh/website/index.html
