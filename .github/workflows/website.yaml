# The website deploy: a push that touches the site is a publish. The
# job regenerates the page's ConfigMap on the liken.sh cluster and
# rolls the deployment (make website-content is the whole act), then
# checks the served page byte-for-byte against what it shipped —
# nothing here rebuilds an image or reboots a machine.
#
# The credential is WEBSITE_KUBECONFIG, delivered to the secret store
# by terraform and scoped to the website's namespace alone
# (liken.sh/website/manifests/deployer.yaml), so this workflow can
# rewrite the page and nothing else. It lands at the gitignored path
# the ./kubectl wrapper already reads. Manifest changes are outside
# this credential's reach on purpose; those deploy from a workstation
# with `make website`.
name: website

on:
  push:
    branches: [main]
    paths:
      - liken.sh/website/**
      - .github/workflows/website.yaml

permissions:
  contents: read

# Deploys serialize: two pushes in quick succession would otherwise
# race their rollouts, and the page check below wants the world still.
concurrency:
  group: website

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: place the credential
        env:
          WEBSITE_KUBECONFIG: ${{ secrets.WEBSITE_KUBECONFIG }}
        run: |
          mkdir -p liken.sh/identity
          printf '%s' "$WEBSITE_KUBECONFIG" > liken.sh/identity/kubeconfig

      - run: make -C liken.sh website-content

      # Prove the deploy the way a reader meets it: the page served
      # over the public name is exactly the file this commit carries.
      - name: verify the served page
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 \
            https://liken.sh -o served.html
          cmp served.html liken.sh/website/index.html
