# This is the release. It runs when a version tag lands: it builds
# the bundle under the tagged version, proves that the same tree
# still boots, and publishes the bundle to the channel at
# https://releases.liken.sh. The tag is the act of release
# (releases/versioning.md). This workflow only carries out what the
# tag requires. So cutting a release from a workstation is only
#
#   git tag v2026.07.11-001 && git push origin v2026.07.11-001
#
# The channel is object storage, and the workflow talks directly to
# it, using the scoped key that Terraform delivered as repository
# secrets (liken.sh/terraform.tf). No machine can reach anything here
# until its Cluster document names the version and pins the digest
# that this run prints. Publishing makes bytes available. It never
# adopts them anywhere.
name: release

on:
  push:
    tags: ["v*"]

# contents: write is what lets the last step create the GitHub
# release. Every step before it only reads the tree. The real
# publishing credentials (the channel's key) arrive as secrets, not
# through this token.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # This step checks out full history and tags: version.mk names
      # dev artifacts with git describe even during a release build,
      # and describe needs to see the tags to do that.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The version is the tag without its conventional v prefix, and
      # it must be a real release version: it must follow the CalVer
      # grammar that the whole system agrees on, and it must not be
      # serial 000, which versioning.md reserves for lab substitutes
      # that must never be published. The releases Makefile checks the
      # grammar again. Failing here just names the problem before the
      # workflow spends a build on it.
      - name: derive the version from the tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]{3}$ ]]; then
            echo "tag $GITHUB_REF_NAME is not a release version (vyyyy.mm.dd-nnn)" >&2
            exit 1
          fi
          if [[ "$VERSION" == *-000 ]]; then
            echo "serial 000 is the lab stand-in and is never published" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/build-setup

      # This step builds every liken binary under the release version,
      # and lays out releases/dist/<version>/ exactly as the channel
      # serves it.
      - run: make release VERSION=${{ steps.version.outputs.version }}

      # Then this step boots the same tree before a byte leaves the
      # runner: the smoke drill installs node-1 onto a blank disk,
      # boots that disk, and passes when its node reports Ready over
      # the cluster's API. Releases are immutable, so this run must
      # catch a bundle that cannot boot. After publication, the only
      # remedy is the next serial.
      - run: make smoke-uefi

      # s3cmd is the uploader, because it speaks plain S3 to non-AWS
      # endpoints without errors. Recent aws-cli versions attach
      # AWS-only integrity checksums that Linode's S3 implementation
      # rejects. The config names the endpoint. The key comes from the
      # repository secrets that Terraform keeps delivered.
      - name: configure the uploader
        env:
          RELEASES_ACCESS_KEY: ${{ secrets.RELEASES_ACCESS_KEY }}
          RELEASES_SECRET_KEY: ${{ secrets.RELEASES_SECRET_KEY }}
        run: |
          sudo apt-get install -y --no-install-recommends s3cmd
          cat > ~/.s3cfg <<EOF
          [default]
          access_key = $RELEASES_ACCESS_KEY
          secret_key = $RELEASES_SECRET_KEY
          host_base = us-east-1.linodeobjects.com
          host_bucket = %(bucket)s.us-east-1.linodeobjects.com
          use_https = True
          EOF

      # Releases are immutable: the workflow never rewrites a
      # published version, and only the next serial supersedes it. A
      # tag that names an already published version fails here, before
      # any byte moves.
      - name: refuse to republish
        run: |
          if s3cmd info "s3://releases.liken.sh/${{ steps.version.outputs.version }}/release.yaml" >/dev/null 2>&1; then
            echo "release ${{ steps.version.outputs.version }} is already published; releases are immutable" >&2
            exit 1
          fi

      # The corresponding sources go up before the release does. The
      # GPL- and LGPL-licensed components in the artifacts require the
      # channel to offer their source from the same place it offers
      # the binaries (licensing/sources.sh explains this). So no
      # release may be discoverable before its sources are. The mirror
      # is keyed by component version, not release version, and the
      # script skips everything the channel already serves. So a
      # release whose pins have not moved downloads and uploads
      # nothing here; only a pin bump moves new bytes. When every file
      # is already published, the workflow does not produce the
      # sources tree at all, and the publish loop below has nothing to
      # do.
      - name: mirror the corresponding sources
        run: make -C licensing sources

      - name: publish the sources
        run: |
          if [ ! -d licensing/dist/sources ]; then
            echo "every source is already on the channel"
            exit 0
          fi
          cd licensing/dist/sources
          find . -type f | sort | while read -r file; do
            key="sources/${file#./}"
            if ! s3cmd info "s3://releases.liken.sh/$key" >/dev/null 2>&1; then
              s3cmd put --acl-public --no-progress "$file" "s3://releases.liken.sh/$key"
            fi
          done

      # This step publishes the artifacts first, and the document
      # last: release.yaml is how anyone discovers the artifacts, so
      # until it lands, the half-uploaded release simply does not
      # exist yet. Every object is public-read, because the channel is
      # public by design, while the bucket itself refuses to list its
      # contents, so only named paths answer. channel.yaml goes last
      # of all, and it is the channel's one mutable object: the
      # advisory pointer that clusters poll to learn the latest
      # version (the immutability guard above stops a re-run of an old
      # tag from ever moving that pointer backwards).
      - name: publish
        working-directory: releases/dist/${{ steps.version.outputs.version }}
        run: |
          for artifact in *; do
            [ "$artifact" = release.yaml ] && continue
            s3cmd put --acl-public --no-progress "$artifact" \
              "s3://releases.liken.sh/${{ steps.version.outputs.version }}/$artifact"
          done
          s3cmd put --acl-public --no-progress release.yaml \
            "s3://releases.liken.sh/${{ steps.version.outputs.version }}/release.yaml"
          s3cmd put --acl-public --no-progress ../channel.yaml \
            "s3://releases.liken.sh/channel.yaml"
          s3cmd put --acl-public --no-progress --mime-type=image/x-icon \
            ../../../brand/favicon.ico \
            "s3://releases.liken.sh/favicon.ico"
          s3cmd put --acl-public --no-progress \
            --mime-type="text/html; charset=utf-8" \
            ../../index.html \
            "s3://releases.liken.sh/index.html"

      # This step proves the release the way a consumer meets it: it
      # fetches the document over the public URL, compares it byte for
      # byte against what was built, and prints the catalog entry that
      # a Cluster commits to when it adopts this release. The digest
      # is the root of the trust chain, so it is worth showing where a
      # person will copy it from.
      - name: verify from the public channel
        run: |
          VERSION=${{ steps.version.outputs.version }}
          curl --fail --silent --show-error --retry 5 --retry-delay 5 \
            "https://releases.liken.sh/$VERSION/release.yaml" -o fetched.yaml
          cmp fetched.yaml "releases/dist/$VERSION/release.yaml"
          LATEST=$(curl --fail --silent --show-error \
            "https://releases.liken.sh/channel.yaml" | awk '/^latest:/ {print $2}')
          if [[ "$LATEST" < "$VERSION" ]]; then
            echo "channel.yaml names $LATEST as latest but $VERSION just published" >&2
            exit 1
          fi
          DIGEST=$(sha256sum "releases/dist/$VERSION/release.yaml" | cut -d' ' -f1)
          {
            echo "## liken $VERSION"
            echo
            echo "Published to https://releases.liken.sh/$VERSION/"
            echo
            echo "Catalog entry for a Cluster's spec.releases.catalog:"
            echo
            echo '```yaml'
            echo "  - version: $VERSION"
            echo "    digest: sha256:$DIGEST"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # The GitHub release is the announcement, not the distribution:
      # a page that people can watch, and an RSS feed that clusters'
      # operators can follow, carrying the catalog entry so that
      # adopting the release is a copy and a paste from the release
      # page. The artifacts deliberately stay off this page. The
      # channel is the one place binaries live, because the GPL notice
      # requirements travel with the binaries, and the channel is
      # where LICENSES.md and the source mirror already satisfy them.
      # The notes are the commit subjects since the last release:
      # commit messages here are written as prose, so the log is the
      # changelog.
      - name: publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "the GitHub release already exists"
            exit 0
          fi
          DIGEST=$(sha256sum "releases/dist/$VERSION/release.yaml" | cut -d' ' -f1)
          PREVIOUS=$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)
          {
            echo "Published to https://releases.liken.sh/$VERSION/release.yaml."
            echo
            echo "To adopt it, add the catalog entry to your Cluster's"
            echo "spec.releases.catalog and set spec.version:"
            echo
            echo '```yaml'
            echo "  - version: $VERSION"
            echo "    digest: sha256:$DIGEST"
            echo '```'
            echo
            if [ -n "$PREVIOUS" ]; then
              echo "Changes since $PREVIOUS:"
            else
              echo "Changes:"
            fi
            echo
            git log --format='- %s' ${PREVIOUS:+$PREVIOUS..}"$GITHUB_REF_NAME"
          } > notes.md
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --title "liken $VERSION" --notes-file notes.md
