# The build, run by GitHub Actions on every push to main and every
# pull request against it: `make all` and then `make smoke`, the same
# commands a developer runs. The checks workflow proves the tree is
# clean; this one proves it still assembles an operating system, and
# that the operating system still boots to a Ready Kubernetes node.
#
# Like the checks workflow, this one is deliberately thin. The build
# logic lives in the Makefiles, and the runner preparation (toolchain,
# KVM, vendored-input caches) lives in the build-setup action shared
# with the release workflow; all this file adds is which commands run
# for which events.
name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Full history, because the build names itself with git describe
      # (version.mk): the most recent release tag and the distance past
      # it. A shallow checkout would leave describe blind to the tags
      # and every CI build would claim to be a bare commit.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/build-setup

      # The whole system: every vendored input fetched and verified,
      # the Go programs compiled, a fresh identity minted, and the
      # bootable image assembled.
      - run: make all

      # Then boot it. The smoke drill (dev-cluster/smoke.sh) starts
      # node-1 from blank disks and passes when its node reports Ready
      # over the cluster's API — the assembled image actually running
      # Kubernetes, not just existing.
      - run: make smoke

      # The serial console is the record of the boot, and it is worth
      # keeping when the drill passes, not just when it fails: a
      # healthy boot is the baseline the next unhealthy one gets
      # compared against. qemu.log rides along because it is where the
      # failure lands when QEMU itself never got as far as a console.
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: node-1-logs
          path: dev-cluster/guests/node-1/*.log
          if-no-files-found: ignore
