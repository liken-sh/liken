# This is the build. GitHub Actions runs it on every push to main and
# every pull request against main: `make all`, then the smoke drills,
# the same commands a developer runs. The checks workflow proves the
# tree is clean. This workflow proves the tree still assembles an
# operating system, and that the operating system still boots to a
# Ready Kubernetes node, under both firmware types that liken
# supports.
#
# Like the checks workflow, this workflow is deliberately small. The
# build logic lives in the Makefiles, and the runner preparation
# (toolchain, KVM, vendored-input caches) lives in the build-setup
# action shared with the release workflow. All this file adds is
# which commands run for which events.
name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # This step checks out full history, because the build names
      # itself with git describe (version.mk): the most recent release
      # tag and the distance past it. A shallow checkout would leave
      # describe unable to see the tags, and every CI build would
      # claim to be a bare commit.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/build-setup

      # This step builds the whole system: every vendored input
      # fetched and verified, the Go programs compiled, a fresh
      # identity minted, and the bootable image assembled.
      - run: make all

      # Then this step boots it. The UEFI smoke drill
      # (dev-cluster/smoke.sh) installs node-1 onto a blank disk,
      # boots that disk through OVMF's NVRAM boot entries, and passes
      # when its node reports Ready over the cluster's API. This
      # proves the install path, the UEFI boot chain, and that the
      # assembled image actually runs Kubernetes.
      - run: make smoke-uefi

      # Then this step runs the same drill under BIOS firmware. This
      # run proves the other boot chain: MBR boot code, GRUB's core
      # image, its config on the boot home, and the chosen slot's
      # kernel.
      - run: make smoke-bios

      # The serial console is the record of the boot, and it is worth
      # keeping when the drill passes, not just when it fails: a
      # healthy boot is the baseline that the next unhealthy one gets
      # compared against. This step also uploads qemu.log, because
      # that is where the failure appears when QEMU itself never gets
      # as far as a console.
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: node-1-logs
          path: dev-cluster/guests/node-1/*.log
          if-no-files-found: ignore
