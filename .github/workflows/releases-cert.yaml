# This is the channel's certificate. Linode terminates TLS for the
# releases.liken.sh bucket with a certificate that its owner uploads.
# Linode offers no ACME on their side. So this workflow is the ACME
# client, run monthly: it proves control of the name with a DNS-01
# challenge against the liken.sh zone, then gives the fresh
# certificate to the bucket. Let's Encrypt certificates last 90 days.
# A monthly cadence means the certificate being replaced always has
# plenty of time left before expiry, so a failed run is a warning, not
# an outage.
#
# Everything here depends on one credential: RELEASES_CERT_TOKEN, a
# Linode token scoped to Domains and Object Storage read/write,
# delivered to this repository by Terraform (liken.sh/terraform.tf).
# Nothing persists between runs. Each run mints a fresh ACME account
# and a fresh certificate, and Let's Encrypt's rate limits allow this
# volume many times over.
#
# workflow_dispatch is not just for rehearsal. Dispatching this
# workflow is also how the certificate first comes to exist, and it
# is the remedy any time the handshake check below reports trouble.
name: releases-cert

on:
  schedule:
    - cron: "17 6 3 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: releases-cert

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # lego is a single static binary, and the runner needs nothing
      # else. So this workflow has no checkout step. This step pins
      # lego by version, like every vendored input in this
      # repository.
      - name: fetch lego
        run: |
          curl --fail --silent --show-error --location \
            -o lego.tar.gz \
            https://github.com/go-acme/lego/releases/download/v5.2.2/lego_v5.2.2_linux_amd64.tar.gz
          tar -xzf lego.tar.gz lego

      # This is the DNS-01 challenge: lego adds a TXT record to the
      # liken.sh zone through Linode's API, waits for Let's Encrypt to
      # see it, then removes it. The long propagation window accounts
      # for Linode's nameservers, which pick up zone edits on a
      # refresh cycle rather than immediately.
      - name: obtain a certificate
        env:
          LINODE_TOKEN: ${{ secrets.RELEASES_CERT_TOKEN }}
          LINODE_PROPAGATION_TIMEOUT: "900"
          LINODE_POLLING_INTERVAL: "15"
        run: |
          ./lego run --accept-tos --email c@guid.foo \
            --dns linode --domains releases.liken.sh

      # The bucket holds at most one certificate, so renewal deletes
      # the old one, then uploads the new one. The delete step is
      # allowed to fail: a bucket that has never held a certificate
      # returns an error here, and that error means nothing here.
      - name: install the certificate on the bucket
        env:
          LINODE_TOKEN: ${{ secrets.RELEASES_CERT_TOKEN }}
        run: |
          curl --silent --show-error -X DELETE \
            -H "Authorization: Bearer $LINODE_TOKEN" \
            https://api.linode.com/v4/object-storage/buckets/us-east/releases.liken.sh/ssl \
            || true
          jq --null-input \
            --rawfile cert .lego/certificates/releases.liken.sh.crt \
            --rawfile key .lego/certificates/releases.liken.sh.key \
            '{certificate: $cert, private_key: $key}' \
          | curl --fail --silent --show-error -X POST \
              -H "Authorization: Bearer $LINODE_TOKEN" \
              -H "Content-Type: application/json" \
              --data @- \
              https://api.linode.com/v4/object-storage/buckets/us-east/releases.liken.sh/ssl

      # This step proves the certificate the way a downloader meets
      # it: a real handshake with the public name, checking that the
      # served certificate both names the channel and has at least 60
      # days left before expiry. A freshly minted 90-day certificate
      # always meets that condition, so anything less means an old
      # certificate is still being served. The retry loop gives
      # Linode's edge a bounded few minutes to start serving the new
      # certificate.
      - name: prove the handshake
        run: |
          for attempt in $(seq 20); do
            served=$(echo | openssl s_client -connect releases.liken.sh:443 \
              -servername releases.liken.sh 2>/dev/null | openssl x509 2>/dev/null) || served=""
            if [ -n "$served" ] \
              && echo "$served" | openssl x509 -noout -checkend 5184000 >/dev/null \
              && echo "$served" | openssl x509 -noout -ext subjectAltName | grep -q releases.liken.sh; then
              echo "releases.liken.sh presents a fresh certificate:"
              echo "$served" | openssl x509 -noout -subject -issuer -enddate
              exit 0
            fi
            sleep 15
          done
          echo "releases.liken.sh is not serving the new certificate" >&2
          exit 1
