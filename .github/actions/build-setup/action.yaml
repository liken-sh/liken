# This is the build environment, shared by every workflow that
# assembles the operating system. The build and release workflows run
# the same Makefiles and need the same runner preparation: toolchain,
# virtual hardware, and caches. So that preparation lives here once,
# and the two workflows cannot grow apart.
name: build setup
description: Toolchain, KVM access, and vendored-input caches for building liken

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    # The fetch scripts document their own host requirements, and the
    # runner image already has most of them (curl, tar, ar, zstd,
    # openssl, docker). cpio archives the image, and depmod (kmod)
    # indexes the kernel's modules. QEMU, qemu-img (qemu-utils), and
    # OVMF are the smoke drill's virtual hardware: the same packages,
    # at the same firmware path, that the dev-cluster Makefile
    # documents.
    - name: install host tools
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cpio kmod qemu-system-x86 qemu-utils ovmf

    # The runners expose /dev/kvm, but only to root. This is the
    # standard rule to open it to every user, which is fine on a
    # single-use throwaway VM. If this rule ever breaks, the smoke
    # drill gets slower rather than failing: the QEMU flags fall back
    # from KVM to pure emulation (-accel kvm -accel tcg, in that
    # order).
    - name: open /dev/kvm to the runner user
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # This is one cache for each vendored domain, keyed on the same
    # prerequisites that the root Makefile declares for that domain's
    # artifact. A pin bump changes the key, so only that domain
    # rebuilds cold; the kernel's 187M does not download again just
    # because k3s moved. The Go programs are deliberately not cached
    # here (beyond setup-go's module and build caches): they are the
    # code under test, and they rebuild on every run.
    - uses: actions/cache@v6
      with:
        path: kernel/dist
        key: kernel-${{ hashFiles('kernel/VERSION', 'kernel/fetch.sh') }}
    - uses: actions/cache@v6
      with:
        path: k3s/dist
        key: k3s-${{ hashFiles('k3s/VERSION', 'k3s/fetch.sh') }}
    - uses: actions/cache@v6
      with:
        path: xtables/dist
        key: xtables-${{ hashFiles('xtables/VERSION', 'xtables/fetch.sh') }}
    - uses: actions/cache@v6
      with:
        path: trust/dist
        key: trust-${{ hashFiles('trust/VERSION', 'trust/fetch.sh') }}
    - uses: actions/cache@v6
      with:
        path: e2fsprogs/dist
        key: e2fsprogs-${{ hashFiles('e2fsprogs/VERSION', 'e2fsprogs/fetch.sh') }}
    # The cache carries only what fetch.sh built. The iscsid image
    # tar in it is always stale, because the tar bakes in the liken
    # version, and that version now changes with every commit. The
    # version stamp file (version.mk) gets a fresh timestamp during
    # the run. So make rebuilds the tar from the cached binaries every
    # time. This step is cheap, compared to the container build that
    # the cache exists to avoid.
    - uses: actions/cache@v6
      with:
        path: open-iscsi/dist
        key: open-iscsi-${{ hashFiles('open-iscsi/VERSION', 'open-iscsi/fetch.sh') }}
    - uses: actions/cache@v6
      with:
        path: nfs-utils/dist
        key: nfs-utils-${{ hashFiles('nfs-utils/VERSION', 'nfs-utils/fetch.sh') }}
    - uses: actions/cache@v6
      with:
        path: systemd-boot/dist
        key: systemd-boot-${{ hashFiles('systemd-boot/VERSION', 'systemd-boot/fetch.sh') }}
    # grub's dist carries the fetched module tree and tool, plus the
    # core image linked from them. So the key also covers the inputs
    # to the link step: the embedded config and the module list in
    # the Makefile.
    - uses: actions/cache@v6
      with:
        path: grub/dist
        key: grub-${{ hashFiles('grub/VERSION', 'grub/fetch.sh', 'grub/early.cfg', 'grub/Makefile') }}
    # The firmware cache carries the derived set, not the upstream
    # tarball, so a hit skips both the 400 MB download and the
    # derivation. The key includes the kernel pin because the derived
    # set is a function of the kernel's module tree: a kernel bump
    # must re-derive even when the firmware pin is unchanged.
    - uses: actions/cache@v6
      with:
        path: linux-firmware/dist
        key: linux-firmware-${{ hashFiles('linux-firmware/VERSION', 'linux-firmware/fetch.sh', 'linux-firmware/derive.sh', 'kernel/VERSION') }}

    # Make decides staleness by timestamps, and the two halves of
    # this working tree carry different timestamps: checkout stamps
    # the sources with the time of the run, while the cache restores
    # its artifacts with the older times they were archived with. Left
    # alone, every cached artifact looks out of date, and make
    # fetches it all again. Touching the restored artifacts is
    # correct, because each cache key hashes the artifact's real
    # prerequisites. A cache hit means those inputs are unchanged, so
    # the artifact is current regardless of its timestamp.
    - name: refresh cached artifact timestamps
      shell: bash
      run: |
        for dist in kernel/dist k3s/dist xtables/dist trust/dist \
                    e2fsprogs/dist open-iscsi/dist nfs-utils/dist \
                    systemd-boot/dist grub/dist linux-firmware/dist; do
            [ -d "$dist" ] && find "$dist" -type f -exec touch {} +
        done
        true
