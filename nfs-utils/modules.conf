# The nfs feature's kernel half. image/build.sh stages this file at
# /etc/liken/features/nfs/modules.conf and ships the modules it names.
# init loads them only when the cluster document declares the
# feature. The file's presence in a booted image is how init knows the
# payload shipped at all (init/features.go).
#
# nfsv4 is the NFSv4 client. Nearly everything an NFS mount needs
# comes through its dependency chain (nfs, sunrpc, lockd, and the
# rest), resolved through the same depmod index as every other module.
# This file deliberately leaves out nfsv3: this feature is v4 only,
# because v3 would put rpcbind and rpc.statd on the host, two daemons
# k3s does not depend on. v4 carries locking in the protocol's own
# leases instead.
nfsv4
