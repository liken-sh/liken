# This is the cluster operator's deployment: the fleet's one
# observer, running as an ordinary Kubernetes workload.
#
# The machine operator's manifest is shaped by running directly on
# the machine: a privileged DaemonSet with hostPath mounts. This
# manifest is different. It is shaped by deliberately depending on no
# single machine: a single-replica Deployment with no volumes, no
# host network, and no privilege. The API is its only input and
# output, so the scheduler may place it on any liken node, and
# Kubernetes itself replaces it when its node dies.
#
# This deployment deliberately has no leader election.
# kube-controller-manager and kube-scheduler elect leaders because
# they run *below* the scheduler: static pods on every control-plane
# node, with hot standbys and a lease as their only way to agree on
# one active copy. This program runs above the scheduler, so "run
# exactly one somewhere" is the scheduler's own job. The replica
# count and the Recreate strategy below provide the whole election.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: liken-cluster-operator
  namespace: liken-system
---
# These are the cluster operator's permissions: broad reads across
# the fleet, and writes only to the fields whose whole point is that
# no single machine can write them. Note the asymmetry with the
# machine operator's role. This role may update any Machine's status,
# for Lost verdicts and reboot grants, but it can never create a
# Machine, change a spec, or modify a Node. The machine operators may
# do all of those to themselves, but they cannot write the Cluster's
# status. Each program holds exactly the authority its verdicts
# need.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: liken-cluster-operator
rules:
  # The fleet: watch every Machine, which is the sweep's wake
  # signal, and write statuses for the two condition-and-phase
  # verdicts that this program owns: the Lost phase and the
  # RebootApproved grant.
  - apiGroups: [liken.sh]
    resources: [machines]
    verbs: [get, list, watch]
  - apiGroups: [liken.sh]
    resources: [machines/status]
    verbs: [update]
  # The Cluster: list is how the operator finds the one Cluster it
  # serves, because it takes no configuration. get is every pass's
  # fresh read. Its status is this program's alone to write. This
  # role has no create permission, because the machine operators
  # seed the object from the image's manifest.
  - apiGroups: [liken.sh]
    resources: [clusters]
    verbs: [get, list]
  - apiGroups: [liken.sh]
    resources: [clusters/status]
    verbs: [update]
  # The pod steward (steward.go): list the OS DaemonSets' pods and
  # evict the stale ones after an upgrade. This role uses eviction
  # instead of delete for the same reason the drain does: the API
  # server refuses an eviction that would violate a
  # PodDisruptionBudget.
  - apiGroups: [""]
    resources: [pods]
    verbs: [list]
  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]
  # The steward reads each stewarded DaemonSet to learn which
  # release's manifests are actually applied, from the
  # liken.sh/os-version annotation. This is the release that its pod
  # refreshes aim to match. The feature janitor (janitor.go) lists
  # the same DaemonSets, looking for liken.sh/feature annotations,
  # and deletes the ones whose feature the cluster document no
  # longer declares. Delete is a broad permission for an observer to
  # hold, so the janitor's own judgment stays narrow: it only ever
  # deletes an object carrying the annotation, and only feature
  # manifests carry one.
  - apiGroups: [apps]
    resources: [daemonsets]
    verbs: [get, list, delete]
  # The flux janitor (janitor.go): the teardown rights for a
  # retracted flux feature. These are standing, unlike the planter's
  # grant, which the feature's own manifests deliver: the janitor's
  # job begins exactly when those delivered grants disappear, so
  # delivered rights could never clean up after the feature that
  # delivered them. Every rule is held to exact names, and the whole
  # set can only remove the engine, never create or read anything.
  # The CRD and RBAC names must match the engine seed; the parity
  # test in flux_test.go holds them to it. The sync objects also
  # need patch, to strip their finalizers once no controller exists
  # to honor them.
  - apiGroups: [apps]
    resources: [deployments]
    resourceNames: [source-controller, kustomize-controller]
    verbs: [get, delete]
  - apiGroups: [""]
    resources: [namespaces]
    resourceNames: [flux-system]
    verbs: [delete]
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories]
    resourceNames: [flux-system]
    verbs: [patch, delete]
  - apiGroups: [kustomize.toolkit.fluxcd.io]
    resources: [kustomizations]
    resourceNames: [flux-system]
    verbs: [patch, delete]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    resourceNames:
      - buckets.source.toolkit.fluxcd.io
      - externalartifacts.source.toolkit.fluxcd.io
      - gitrepositories.source.toolkit.fluxcd.io
      - helmcharts.source.toolkit.fluxcd.io
      - helmrepositories.source.toolkit.fluxcd.io
      - ocirepositories.source.toolkit.fluxcd.io
      - kustomizations.kustomize.toolkit.fluxcd.io
    verbs: [delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles]
    resourceNames: [crd-controller-flux-system, flux-edit-flux-system, flux-view-flux-system, liken-engine-planter]
    verbs: [delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterrolebindings]
    resourceNames: [cluster-reconciler-flux-system, crd-controller-flux-system, liken-engine-planter]
    verbs: [delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: liken-cluster-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: liken-cluster-operator
subjects:
  - kind: ServiceAccount
    name: liken-cluster-operator
    namespace: liken-system
---
# The heartbeats, read-only: this program judges the fleet's
# liveness by listing the machines' leases, and it never writes one.
# The machine operators hold the matching write-only-your-own role.
# Between the two roles, no lease in liken-system has more writers
# than the one machine whose heartbeat it records.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: liken-cluster-operator-leases
  namespace: liken-system
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: liken-cluster-operator-leases
  namespace: liken-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: liken-cluster-operator-leases
subjects:
  - kind: ServiceAccount
    name: liken-cluster-operator
    namespace: liken-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liken-cluster-operator
  namespace: liken-system
  labels:
    app.kubernetes.io/name: liken-cluster-operator
    app.kubernetes.io/part-of: liken
  # This is the release that these manifests shipped with, the same
  # annotation that the DaemonSets carry. Here, though, it serves two
  # purposes. A DaemonSet needs the pod steward to refresh its pods
  # after an upgrade, because OnDelete means an applied template
  # never recreates anything by itself. A Deployment needs no
  # steward at all. When a new release's manifests land, this
  # annotation changes in the pod template below, and the Deployment
  # replaces its own pod without help.
  annotations:
    liken.sh/os-version: "LIKEN_VERSION"
spec:
  # One replica, and Recreate instead of a rolling update: together
  # they provide the at-most-one guarantee that the fleet's writers
  # assume. A rolling update would briefly run two copies on every
  # release. A brief overlap would be harmless, because two sweeps
  # compute the same verdicts and optimistic concurrency puts the
  # writes in order, but there is no reason to schedule an overlap
  # on purpose.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: liken-cluster-operator
  template:
    metadata:
      labels:
        app: liken-cluster-operator
        app.kubernetes.io/name: liken-cluster-operator
        app.kubernetes.io/part-of: liken
      annotations:
        liken.sh/os-version: "LIKEN_VERSION"
    spec:
      serviceAccountName: liken-cluster-operator
      # This is the priority class for control-plane workloads that
      # are cluster-wide rather than node-local. The machine operator
      # uses system-node-critical, because a node needs its own copy.
      # This deployment uses system-cluster-critical, because the
      # cluster needs one copy somewhere.
      priorityClassName: system-cluster-critical
      # Only liken nodes carry the image, because of
      # imagePullPolicy: Never below. See the machine operator's
      # manifest for the full explanation.
      nodeSelector:
        liken.sh/machine: "true"
      # This sets how long the pod may sit on an unreachable node
      # before Kubernetes schedules its replacement elsewhere. The
      # default is five minutes, tuned for workloads where a false
      # eviction is expensive. This pod is stateless and cheap to
      # move, and five minutes of fleet blindness is exactly what
      # this setting exists to prevent. Fifteen seconds puts failover
      # on the same timescale as the forty-second Lost threshold. A
      # machine death that also takes down the observer pod costs
      # roughly a minute of stale Cluster status. During that
      # minute, `kubectl get nodes` still reports accurate node
      # status, because Kubernetes' own node controller does not
      # depend on this program.
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 15
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 15
      containers:
        - name: operator
          # This is the stable tag. Each node resolves it against
          # whatever build that node's OS imported, the same airgap
          # arrangement as every OS image, explained in the machine
          # operator's manifest. Mid-upgrade, the pod may land on a
          # node whose OS carries an older build than these
          # manifests shipped with. That version gap is a normal
          # part of a fleet mid-upgrade, and every release's operator
          # must tolerate its neighbors running older versions
          # anyway.
          image: liken.sh/cluster-operator:installed
          imagePullPolicy: Never
