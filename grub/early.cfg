# The configuration grub-mkimage embeds inside the core image: the
# first code that has any say in how a BIOS machine boots liken.
#
# It runs before GRUB's `normal` mode starts, under the bare-bones
# rescue parser. The rescue parser has no if, no menus, and no
# variables beyond plain set. So this file does the one thing that
# cannot wait, then hands off: it finds the boot home by its
# filesystem label, points the prefix there, and starts normal mode,
# which reads $prefix/grub.cfg with the full scripting language. All
# the real logic (the environment block, the slot choice, the
# fallback) lives in that grub.cfg, which init can rewrite. This
# embedded half is deliberately too small to ever need changing,
# because changing it means rewriting the core image on the disk.
#
# Searching by label instead of by device name matters for the same
# reason liken's partitions carry role names: BIOS drive numbers and
# partition positions describe a disk within one boot, not across
# boots or hardware changes. The label travels with the filesystem.
#
# These comments never reach the core image: the Makefile strips
# them before grub-mkimage embeds the file. The rescue parser is not
# only short on features, it is also quote-blind. An apostrophe in
# prose opens a string that silently swallows every following line,
# up to the next apostrophe, commands included. (This was found the
# hard way: a comment block exactly like this one swallowed the
# search command below, and GRUB booted to a rescue prompt with no
# root set.) Only the three bare command lines below may be embedded.
search.fs_label LIKEN-BOOT root
set prefix=($root)/grub
normal
