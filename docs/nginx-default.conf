# The website's server block, replacing the nginx image's default.
#
# The site is a tree of files, so nginx only has to name them
# correctly. Hugo writes each page as a directory with an index.html
# inside, which the index directive serves at the clean URL, with no
# rewrites. The one thing the stock configuration gets wrong is the
# Markdown twins: nginx's MIME table has no entry for .md, and the
# text/markdown type is the reason an agent can read a page without
# scraping HTML.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    error_page 404 /404.html;

    # A types block in a child context replaces the inherited table
    # entirely. Empty, it makes every match fall through to
    # default_type, which is exactly what a .md-only location wants.
    location ~ \.md$ {
        types {}
        default_type "text/markdown; charset=utf-8";
    }
}
