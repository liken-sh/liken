# The website: the front page and the manual, served by the cluster
# it describes.
#
# The whole site is baked into one nginx image, built by the docs
# domain and published to ghcr.io by CI (.github/workflows/docs.yaml).
# The image is the artifact: nested paths work, there is no size cap,
# and rolling the site back is running the previous tag.
#
# The image field here says latest, and that is only the fallback. On
# every publish, CI patches this Deployment to the pushed commit's
# own tag, so the cluster normally runs a sha-pinned image. A
# workstation apply of this file resets the field to latest, which
# still serves the current site (the tags move together, and Always
# makes the kubelet check), until the next docs push pins it again.
#
# The cluster holds no ghcr.io credential, so the website package on
# ghcr.io must be public for the pull to work.
#
# Traffic arrives through Traefik, the cluster's declared ingress
# (cluster.yaml opts into it). The service load balancer binds
# Traefik to the node's own addresses, so the ports that liken.sh
# resolves to are the ports that Traefik answers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
        - name: nginx
          image: ghcr.io/liken-sh/website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: website
spec:
  selector:
    app: website
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website
  namespace: website
  annotations:
    # Traefik terminates TLS for this site with a certificate that it
    # maintains itself. The resolver named here is defined in
    # traefik-tls.yaml. Pointing this annotation at "staging" instead
    # swaps in Let's Encrypt's staging environment: the same steps,
    # untrusted roots, and higher rate limits. This is the way to
    # rehearse a certificate change without spending real issuance
    # attempts.
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    # The hosts named here are the names the certificate is issued
    # for. The annotation only picks which resolver does the
    # issuing.
    - hosts:
        - liken.sh
        - www.liken.sh
  rules:
    - host: liken.sh
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 80
    - host: www.liken.sh
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 80
