# The CI deploy credential's authority: the user "website-deployer"
# may update the website's content, and nothing else.
#
# The user is not declared anywhere, because Kubernetes has no user
# objects. CI presents a client certificate whose common name is
# website-deployer, signed by the cluster's client CA. terraform
# mints this certificate offline from identity/ and delivers it to
# GitHub's secret store (terraform.tf tells that story). These rules
# are what give the name its meaning: exactly the verbs that a
# content deploy performs (patch the Deployment's image to a new
# tag, watch the rollout land), inside this one namespace. A leaked
# credential can point the site at a different already-pushed image,
# and nothing more. It cannot read a secret, touch kube-system, or
# reach the machines.
#
# Keeping authority here, rather than in the certificate, is also
# the revocation story, since nobody can recall a certificate once
# issued. Instead, delete the RoleBinding, and the certificate
# authenticates a user who can do nothing.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: website-deployer
  namespace: website
rules:
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: website-deployer
  namespace: website
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: website-deployer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: website-deployer
