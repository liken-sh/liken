# The boot entry for a liken machine on Linode, in GRUB's language.
#
# An installed liken machine normally carries no bootloader at all:
# the installer writes UEFI boot entries into firmware variables, and
# the firmware loads the kernel's EFI stub straight from the active
# slot. Linode's hosts boot BIOS-style instead, with no firmware
# variables to write, so this deployment's disk carries its own GRUB
# (the Makefile installs it into the MBR and a small BIOS boot
# partition), and this file is its menu: one entry saying exactly
# what the EFI boot entry would have said — the kernel, the two
# initrd archives loaded in order (the boot archive, then the
# deployment layer whose files override it), and the same command
# line the installer bakes into its entries. The system image itself
# is not loaded here: init mounts liken.sqfs straight from the slot,
# so GRUB stages a few dozen megabytes, not the whole OS.
#
# One honest limitation rides along: this file pins slot A. The
# firmware half of liken's blue-green upgrade (BootNext to trial a
# slot, BootOrder to promote it) has nothing to actuate here, so a
# release upgrade on this machine waits on a BIOS-boot milestone
# that teaches liken to rewrite this file the way it rewrites boot
# entries.

set default=0
set timeout=0

menuentry 'liken (slot A)' {
        insmod part_gpt
        insmod fat
        # Prefer finding the slot by its filesystem label; the plain
        # set root above the search is the fallback if the host's
        # GRUB lacks the search module.
        set root=(hd0,gpt1)
        search --no-floppy --label LIKEN-SYS-A --set=root
        linux /vmlinuz console=ttyS0 rdinit=/liken liken.machine=node-1 liken.slot=A panic=10
        initrd /boot.cpio /deployment.cpio
}
