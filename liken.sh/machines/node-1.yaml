# node-1: the founding leader of the liken.sh cluster, and, so far,
# its only machine: the Linode instance that terraform.tf provisions
# as liken-node-1. Like every Machine manifest, this file is a seed,
# and the machine consults it exactly once. The install bakes it into
# the deployment layer, the first boot proves it, and from then on
# the machine reads its manifests from its own machineState disk and
# is edited through the cluster's API.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-1
spec:
  # Nobody sits at this machine's console. There is no console; a
  # serial line reachable over lish is the closest thing to one. For
  # this reason, staged changes that need a reboot get one
  # automatically.
  rebootPolicy: Auto
  network:
    # Two interfaces, two jobs, attached exactly as the boot config
    # in terraform.tf sets them up. eth0 is Linode's public network,
    # which serves addresses over DHCP. The lease carries the
    # machine's static public IPv4 address, the gateway, and the
    # resolvers. eth1 is the private VLAN, the cluster segment, where
    # the founding leader's address must exist before any
    # negotiation could assign it, because cluster.yaml's endpoint
    # names it.
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.1/24
  # Two disks, split by lifetime. The system disk (/dev/sda) holds
  # the OS: boot slots and the machine's own state. It ships whole,
  # as a disk image that terraform.tf uploads and stamps onto the
  # disk, so every ship erases it. The data disk (/dev/sdb) holds
  # everything that must outlive a ship: the cluster's database, the
  # container store, and pod volumes. Terraform creates this disk raw
  # and blank exactly once, and liken claims it on the machine's
  # first boot. After that, ships replace the system disk around it,
  # and the cluster comes back with its state intact. The device
  # paths matter only on the boot that claims each disk. After that,
  # every partition is recognized by the role name written into the
  # GPT.
  storage:
    # The GRUB boot path: Linode's hosts boot only in BIOS style, and
    # declaring these two roles is the machine's whole declaration
    # that it boots through GRUB. biosBoot is a raw partition that
    # holds GRUB's core image where the MBR's boot code can find it.
    # bootHome is a small FAT32 filesystem that holds GRUB's config
    # and the environment block, which takes the place of the boot
    # variables that this firmware lacks. The installer lays all of
    # this down, and the machine heals it from its proven slot's
    # artifacts on every boot and every reboot. Linode is known to
    # zero MBR boot code under running machines, and this healing is
    # what makes that survivable.
    biosBoot:
      device: /dev/sda
      size: 1Mi
    bootHome:
      device: /dev/sda
      size: 64Mi
    # The OS's two boot slots, FAT32, each holding one complete liken
    # release with headroom.
    systemA:
      device: /dev/sda
      size: 1Gi
    systemB:
      device: /dev/sda
      size: 1Gi
    # The machine's own durable data: staged and proven manifests.
    machineState:
      device: /dev/sda
      size: 64Mi
    # The OS's scratch space: /tmp. 512Mi keeps the system disk's
    # roles inside the 3 GiB image now that the boot slots hold 1Gi
    # each, and it matches what the dev cluster's machines give /tmp.
    machineEphemeral:
      device: /dev/sda
      size: 512Mi
    # k3s's database, TLS material, and containerd's images: the role
    # that makes reboots cheap and upgrades incremental.
    clusterState:
      device: /dev/sdb
      size: 6Gi
    # Durable storage that pods claim by name (the local-path
    # provisioner pool). The website's content ships in images, so
    # this pool starts small.
    podStorage:
      device: /dev/sdb
      size: 8Gi
    # kubelet's working space: emptyDirs and per-pod scratch. The one
    # unsized role on its disk, so it takes the remainder.
    podEphemeral:
      device: /dev/sdb
  # The kernel's default of 128 inotify instances per user runs out
  # quickly on a node where every log-follower and config-watcher
  # holds one.
  sysctls:
    fs.inotify.max_user_instances: "8192"
