# iscsid's configuration, shipped in every image at
# /etc/iscsi/iscsid.conf. Both halves of the initiator read this one
# file: iscsid itself (the feature's DaemonSet, through its /etc/iscsi
# hostPath) and the host's iscsiadm, which CSI drivers run through a
# chroot into the host. iscsid refuses to start without a config file,
# so this file exists but stays minimal on purpose: everything not set
# here keeps open-iscsi's compiled-in default. A deployment that needs
# more (CHAP credentials, timeouts tuned to its SAN) should get it
# through a future feature parameter, not a hand edit to a file the
# image overwrites.
#
# A CSI driver creates sessions explicitly, by logging in for a volume
# it is about to attach. Sessions are never created automatically at
# daemon startup. That is what manual means, and it suits an OS where
# the initiator's node database lives on the RAM root and resets every
# boot: there is nothing for automatic startup to log back into, and
# the driver re-runs discovery and login on every attach anyway.
node.startup = manual
