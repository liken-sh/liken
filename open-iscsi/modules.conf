# The iscsi feature's kernel half. image/build.sh stages this file at
# /etc/liken/features/iscsi/modules.conf and ships the modules it
# names beside every other module the image carries. Init loads them
# only when the cluster document declares the feature, and the file's
# presence in a booted image is how init knows the payload shipped at
# all: a cluster document that declares iscsi against an image without
# this file is asking for a feature that image predates
# (init/features.go).
#
# iscsi_tcp is the in-kernel initiator's TCP transport. iscsid logs in
# to a target in userspace and hands the connected socket to this
# module, which owns the session from then on; that split is why a
# crashed iscsid costs a window without reconnect handling, never
# attached disks. Its dependency chain (libiscsi_tcp, libiscsi,
# scsi_transport_iscsi) ships and loads automatically, resolved
# through the same depmod index as every other module. The driver that
# turns a logged-in LUN into /dev/sdX needs no line here: sd_mod is
# built into the vendored kernel (CONFIG_BLK_DEV_SD=y).
iscsi_tcp
