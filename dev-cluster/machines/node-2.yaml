# node-2: the second leader. Its name is in cluster.yaml's leaders
# list, so it takes the leader role: it runs a control plane and its
# own etcd member, and it joins the cluster through the founding
# leader.
#
# The boot selects this manifest through liken.machine=node-2 on the
# kernel command line. node-1.yaml explains the seed lifecycle and
# the storage vocabulary, which are the same for every machine.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-2
spec:
  # node-1.yaml explains why the lab's machines choose Auto.
  rebootPolicy: Auto
  network:
    # The same two-interface shape as node-1: a DHCP uplink and a
    # static address on the cluster segment. Only the address
    # differs. Every machine on the segment needs its own address,
    # and keeping these addresses unique across manifests is, for
    # now, the manifest author's job.
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.2/24
  # The same storage shape as node-1: every machine owns its own
  # disks, whether it is a follower or not. clusterState matters on a
  # follower too: it holds containerd's images and the kubelet's
  # bookkeeping, and this is what saves a follower from re-importing
  # every container image on every boot.
  storage:
    # node-1.yaml explains the GRUB boot path these two roles declare.
    biosBoot:
      device: /dev/vdc
      size: 1Mi
    bootHome:
      device: /dev/vdc
      size: 64Mi
    systemA:
      device: /dev/vdc
      size: 1Gi
    systemB:
      device: /dev/vdc
      size: 1Gi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
