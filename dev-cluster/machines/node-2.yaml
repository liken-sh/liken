# node-2: the second leader. Its name is in cluster.yaml's leaders
# list, so it derives the leader role: it runs a control plane and an
# etcd member of its own, joining through the founding leader.
#
# Selected at boot by liken.machine=node-2 on the kernel command
# line; node-1.yaml explains the seed lifecycle and the storage
# vocabulary, which are the same for every machine.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-2
spec:
  # The lab exists to drill automated rollouts, so its machines let
  # the operator reboot them on a granted turn. Real fleets choose
  # this deliberately; the default (Manual) stages changes and waits
  # for a person.
  rebootPolicy: Auto
  network:
    # The same two-interface shape as node-1: a DHCP uplink and a
    # static address on the cluster segment. Only the address differs;
    # every machine on the segment needs its own, and keeping them
    # unique across manifests is (for now) the manifest author's job.
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.2/24
  # The same storage shape as node-1: every machine owns its own
  # disks, follower or not. clusterState matters on a follower too:
  # it holds containerd's images and the kubelet's bookkeeping, which
  # is what saves a follower from re-importing every container image
  # on every boot.
  storage:
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
