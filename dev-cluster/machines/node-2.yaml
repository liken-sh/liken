# node-2: the lab's second machine. Its name is not in cluster.yaml's
# servers list, so it derives the agent role: it runs workloads and
# takes direction from node-1's control plane, which it joins through
# the cluster's endpoint bearing the token from the identity bundle.
#
# Selected at boot by liken.machine=node-2 on the kernel command
# line; node-1.yaml explains the seed lifecycle and the storage
# vocabulary, which are the same for every machine.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-2
spec:
  network:
    # The same two-interface shape as node-1: a DHCP uplink and a
    # static address on the cluster segment. Only the address differs;
    # every machine on the segment needs its own, and keeping them
    # unique across manifests is (for now) the manifest author's job.
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.2/24
  # The same storage shape as node-1: every machine owns its own
  # disks, agent or not. clusterState matters on an agent too: it
  # holds containerd's images and the kubelet's bookkeeping, which is
  # what saves an agent from re-importing every container image on
  # every boot.
  storage:
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
