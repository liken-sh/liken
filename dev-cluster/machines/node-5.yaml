# node-5: the lab's second follower. It exists so drills can watch
# workload machines run through control-plane changes: a leader's
# rolling reboot, or its outright loss, should be invisible to a
# follower.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-5
spec:
  # node-1.yaml explains why the lab's machines choose Auto.
  rebootPolicy: Auto
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.5/24
  storage:
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
