# node-5: the lab's second follower. It exists so drills can watch
# workload machines ride through control-plane changes: a leader's
# rolling reboot, or its outright loss, should be invisible from down
# here.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-5
spec:
  # The lab exists to drill automated rollouts, so its machines let
  # the operator reboot them on a granted turn. Real fleets choose
  # this deliberately; the default (Manual) stages changes and waits
  # for a person.
  rebootPolicy: Auto
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.5/24
  storage:
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
