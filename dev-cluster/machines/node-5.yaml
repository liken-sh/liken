# node-5: the lab's second follower. It exists so drills can watch
# workload machines run through control-plane changes: a leader's
# rolling reboot, or its outright loss, should be invisible to a
# follower.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-5
spec:
  # node-1.yaml explains why the lab's machines choose Auto.
  rebootPolicy: Auto
  # The unclaimed-hardware drill (milestone 11): declaring the USB
  # mass-storage drivers here puts them aboard the deployment layer
  # — the layer ships the union of every machine's declared modules
  # — without loading them anywhere else. A stick hot-plugged into
  # *another* node then plays the whole story: its interface sits
  # unclaimed (status names these modules as the candidates), the
  # operator declares one on that machine's spec, and the reboot
  # binds it. Both drivers ship so the report shows a multi-candidate
  # match, which is USB mass storage's normal condition.
  modules: [usb-storage, uas]
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.5/24
  storage:
    # node-1.yaml explains the GRUB boot path these two roles declare.
    biosBoot:
      device: /dev/vdc
      size: 1Mi
    bootHome:
      device: /dev/vdc
      size: 64Mi
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
