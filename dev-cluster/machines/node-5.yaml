# node-5: the lab's second follower. It exists so drills can watch a
# workload machine run through control-plane changes. A leader's
# rolling reboot, or the outright loss of a leader, should be
# invisible to a follower.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-5
spec:
  # node-1.yaml explains why the lab's machines choose Auto.
  rebootPolicy: Auto
  # The unclaimed-hardware drill (milestone 11): declaring the USB
  # mass-storage drivers here puts them aboard the deployment layer.
  # The layer ships the union of every machine's declared modules, so
  # this declaration does not load these drivers anywhere else. A
  # stick plugged into a different node then shows the whole story:
  # its interface stays unclaimed (status names these modules as the
  # candidates), the operator declares one module on that machine's
  # spec, and the reboot binds it. Both drivers ship so the report
  # shows a match with more than one candidate, which is the normal
  # condition for USB mass storage.
  modules: [usb-storage, uas]
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.5/24
  storage:
    # node-1.yaml explains the GRUB boot path these two roles declare.
    biosBoot:
      device: /dev/vdc
      size: 1Mi
    bootHome:
      device: /dev/vdc
      size: 64Mi
    systemA:
      device: /dev/vdc
      size: 1Gi
    systemB:
      device: /dev/vdc
      size: 1Gi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    vm.max_map_count: "262144"
