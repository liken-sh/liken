# node-4: a follower. Its name is not in cluster.yaml's leaders list,
# so it takes the follower role: it runs workloads and takes
# direction from the control plane. It joins the control plane
# through the cluster's endpoint, and it presents the token from the
# identity bundle.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-4
spec:
  # node-1.yaml explains why the lab's machines choose Auto.
  rebootPolicy: Auto
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.4/24
  storage:
    # node-1.yaml explains the GRUB boot path these two roles declare.
    biosBoot:
      device: /dev/vdc
      size: 1Mi
    bootHome:
      device: /dev/vdc
      size: 64Mi
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
  # The declared-modules drill (milestone 18): dummy is the kernel's
  # placeholder network driver. It is harmless everywhere, so this
  # machine stands as the lab's proof that a deployment can ask for a
  # module that the OS itself would never load on its own. The image
  # build ships this module because this manifest declares it, and
  # status.modules on this Machine reports the load.
  modules: [dummy]
  # The node-labels drill (milestone 21): a made-up scheduling label
  # under a domain that the lab owns. Init writes it into the k3s
  # boot drop-in, so the node registers with this label attached, and
  # the operator keeps it in place afterward. If someone rewrites the
  # label by hand, the next reconcile pass restores it.
  nodeLabels:
    guid.foo/drill: node-labels
