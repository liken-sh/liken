# node-4: a follower. Its name is not in cluster.yaml's leaders list,
# so it derives the follower role: it runs workloads and takes
# direction from the control plane, which it joins through the
# cluster's endpoint, presenting the token from the identity bundle.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-4
spec:
  # node-1.yaml explains why the lab's machines choose Auto.
  rebootPolicy: Auto
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.4/24
  storage:
    # node-1.yaml explains the GRUB boot path these two roles declare.
    biosBoot:
      device: /dev/vdc
      size: 1Mi
    bootHome:
      device: /dev/vdc
      size: 64Mi
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
  # The declared-modules drill (milestone 18): dummy is the kernel's
  # placeholder network driver, harmless everywhere, so this machine
  # is the lab's standing proof that a deployment can ask for a
  # module the OS itself would never load. The image build ships it
  # because this manifest declares it, and status.modules on this
  # Machine reports the load.
  modules: [dummy]
  # The node-labels drill (milestone 21): a made-up scheduling label
  # under a domain the lab owns. Init renders it into the k3s boot
  # drop-in so the node registers wearing it, and the operator holds
  # it in place afterward: rewrite it by hand and the next reconcile
  # pass puts it back.
  nodeLabels:
    guid.foo/drill: node-labels
