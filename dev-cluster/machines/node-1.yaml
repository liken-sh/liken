# node-1: the lab's first machine, and the first name in
# cluster.yaml's leaders list. That makes it the founding leader,
# whose control plane the other leaders join through.
#
# One image boots the whole fleet, so this directory carries a
# manifest per machine and each boot selects its own by the
# liken.machine=<name> kernel parameter. That parameter is the
# bootloader's channel for identity, configured per machine even when
# the image is shared. This file is a seed, consulted exactly once:
# the first boot runs under it, and that boot's success writes it to
# the machineState filesystem as the first proven manifest. Every
# boot after reads its manifests from that disk, not from here.
# Editing the Machine in the cluster is how configuration changes
# from then on.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  # The machine's name: its hostname, its Kubernetes node name, and
  # the name the cluster.yaml leaders list refers to.
  name: node-1
spec:
  # The lab exists to drill automated rollouts, so its machines let
  # the operator reboot them on a granted turn. Real fleets choose
  # this deliberately; the default (Manual) stages changes and waits
  # for a person.
  rebootPolicy: Auto
  network:
    # Two interfaces, two jobs. eth0 is the uplink: it uses DHCP on
    # whatever network the machine is plugged into and carries traffic
    # to the outside world. eth1 is the cluster segment. Its address
    # is static because cluster.yaml's endpoint depends on it: every
    # follower is told to find the control plane at 10.10.0.1, so
    # that address has to exist before any negotiation could assign
    # it. (In the lab, the segment is a dumb wire between QEMU guests
    # with no DHCP server on it anyway; see dev-cluster/Makefile.)
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.1/24
  # Storage is declared by purpose, not by mount path; the paths are
  # liken's implementation details. Each role names the device it lives
  # on and, when sharing a disk, how much of it to take; one role per
  # disk may omit its size and take the remainder. The device path only
  # matters on the boot that claims the disk (kernel names are probe
  # order, not identity): claiming writes the role's name onto each
  # partition, and every boot after finds it by that name wherever the
  # disk enumerates. A declared role that can't be satisfied fails the
  # boot: a machine declared to have persistent state must not come up
  # ephemeral.
  storage:
    # The operating system's own boot slots: two EFI system partitions
    # on the boot disk, each big enough to hold one complete liken
    # version (the kernel plus the initramfs, with headroom). The
    # machine runs from one slot and writes upgrades into the other.
    # They are sized explicitly and fixed at claim, because FAT32 (the
    # one filesystem firmware reads) doesn't grow in place.
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    # The machine's own durable data: the staged and proven manifests
    # that let a spec edit survive a reboot. This role comes first
    # among the data roles in the canonical order, so it's an early
    # partition on its disk: the one a future boot must find before it
    # has read any spec.
    machineState:
      device: /dev/vda
      size: 64Mi
    # The operating system's own scratch space: /tmp.
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    # k3s's state: its database, TLS material, and containerd's
    # images. Persisting this is why a reboot doesn't re-import every
    # container image.
    clusterState:
      device: /dev/vda
    # Durable storage pods claim by name: the PersistentVolumeClaim
    # pool, served by k3s's local-path provisioner.
    podStorage:
      device: /dev/vdb
      size: 2Gi
    # kubelet's working space: emptyDirs and per-pod scratch, the pool
    # that pods meter with ephemeral-storage requests and limits.
    podEphemeral:
      device: /dev/vdb
  # Kernel tuning lives in the same document as everything else. Each
  # parameter is deliberately applied twice: by init at boot (so it
  # holds before k3s starts) and by the liken operator from then on
  # (so editing the Machine in-cluster takes effect without a reboot,
  # and drift gets corrected). The kernel's default of 128 inotify
  # instances per user runs out quickly on a node where every
  # log-follower and config-watcher holds one; raising it is one of
  # the most common node tunings.
  sysctls:
    fs.inotify.max_user_instances: "8192"
