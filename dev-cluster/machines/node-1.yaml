# node-1: the lab's first machine, and the first name in
# cluster.yaml's leaders list. This makes it the founding leader, and
# the other leaders join the cluster through its control plane.
#
# One image boots the whole fleet, so this directory carries one
# manifest for each machine, and each boot selects its own manifest
# through the liken.machine=<name> kernel parameter. This parameter
# is the bootloader's channel for identity, set for each machine even
# though the image is shared. This file is a seed, and the machine
# consults it exactly once: the first boot runs under it, and that
# boot's success writes the manifest to the machineState filesystem
# as the first proven manifest. Every boot after that reads its
# manifests from that disk, not from this file. From then on,
# editing the Machine resource in the cluster is how configuration
# changes.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  # The machine's name: its hostname, its Kubernetes node name, and
  # the name the cluster.yaml leaders list refers to.
  name: node-1
spec:
  # The lab exists to drill automated rollouts, so its machines let
  # the operator reboot them at a granted turn. Real fleets choose
  # this setting on purpose; the default (Manual) stages changes and
  # waits for a person.
  rebootPolicy: Auto
  network:
    # Two interfaces, two jobs. eth0 is the uplink: it uses DHCP on
    # whatever network the machine is plugged into, and it carries
    # traffic to the outside world. eth1 is the cluster segment. Its
    # address is static because cluster.yaml's endpoint depends on
    # it: every follower is told to find the control plane at
    # 10.10.0.1, so that address must exist before any negotiation
    # could assign it. (In the lab, the segment is a plain wire
    # between QEMU guests, with no DHCP server on it anyway; see
    # dev-cluster/Makefile.)
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.1/24
  # Storage is declared by purpose, not by mount path; the paths are
  # liken's implementation details. Each role names the device it
  # lives on, and, when the role shares a disk with other roles, how
  # much of the disk to take. One role on each disk may omit its size
  # and take the remaining space. The device path matters only on the
  # boot that claims the disk, because kernel device names reflect
  # probe order, not identity. Claiming writes the role's name onto
  # each partition, and every later boot finds the partition by that
  # name, wherever the disk enumerates it. A declared role that the
  # machine cannot satisfy fails the boot: a machine declared to have
  # persistent state must not come up with ephemeral storage instead.
  storage:
    # The GRUB boot path. Declaring these two roles is how a machine
    # states that it boots through GRUB. The spec has no firmware
    # field; the roles are the declaration. biosBoot is a raw
    # partition, never formatted or mounted, and it holds GRUB's core
    # image where the MBR's 440 bytes of boot code can find it.
    # bootHome is a small FAT32 filesystem that holds GRUB's config
    # and its environment block, the file that takes the place of the
    # boot variables that a BIOS machine's firmware lacks. The lab's
    # machines declare both roles so both firmware types can be
    # drilled on the same manifests. Under UEFI, these are just two
    # small partitions that the boot never reads. Storage
    # declarations bind at claim time, so a guest that already
    # claimed its disks keeps its old layout until `make clean`
    # resets it to factory state.
    biosBoot:
      device: /dev/vdc
      size: 1Mi
    bootHome:
      device: /dev/vdc
      size: 64Mi
    # The operating system's own boot slots: two EFI system
    # partitions on the boot disk, each large enough to hold one
    # complete liken version (the kernel plus the initramfs, with
    # headroom to spare). The machine runs from one slot and writes
    # upgrades into the other. Their sizes are set explicitly and
    # fixed at claim time, because FAT32, the one filesystem that
    # firmware reads, cannot grow in place.
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    # The machine's own durable data: the staged and proven manifests
    # that let a spec edit survive a reboot. This role comes first
    # among the data roles in the canonical order, so it is an early
    # partition on its disk: the partition that a future boot must
    # find before it has read any spec.
    machineState:
      device: /dev/vda
      size: 64Mi
    # The operating system's own scratch space: /tmp.
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    # k3s's state: its database, TLS material, and containerd's
    # images. Persisting this data is why a reboot does not re-import
    # every container image.
    clusterState:
      device: /dev/vda
    # Durable storage that pods claim by name: the
    # PersistentVolumeClaim pool. k3s's local-path provisioner serves
    # this pool.
    podStorage:
      device: /dev/vdb
      size: 2Gi
    # kubelet's working space: emptyDirs and per-pod scratch, the pool
    # that pods meter with ephemeral-storage requests and limits.
    podEphemeral:
      device: /dev/vdb
  # Kernel tuning lives in the same document as everything else. Each
  # parameter is applied twice on purpose: by init at boot (so the
  # setting holds before k3s starts) and by the liken operator from
  # then on (so editing the Machine resource in-cluster takes effect
  # without a reboot, and the operator corrects any drift). The
  # kernel's default of 128 inotify instances per user runs out
  # quickly on a node where every log-follower and config-watcher
  # holds one instance. Raising this limit is one of the most common
  # node tunings.
  sysctls:
    fs.inotify.max_user_instances: "8192"
