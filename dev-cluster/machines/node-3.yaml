# node-3: the third leader. Together, node-1, node-2, and node-3 give
# embedded etcd the odd number of members that majority voting needs.
# This manifest has the same shape as every other machine's manifest;
# only the name and the address differ.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-3
spec:
  # node-1.yaml explains why the lab's machines choose Auto.
  rebootPolicy: Auto
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.3/24
  storage:
    # node-1.yaml explains the GRUB boot path these two roles declare.
    biosBoot:
      device: /dev/vdc
      size: 1Mi
    bootHome:
      device: /dev/vdc
      size: 64Mi
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
