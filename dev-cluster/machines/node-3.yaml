# node-3: the third leader. Together with node-1 and node-2, these
# three are the odd number of members embedded etcd needs for
# majority voting. The manifest is the same shape as every other
# machine's; only the name and address differ.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-3
spec:
  # node-1.yaml explains why the lab's machines choose Auto.
  rebootPolicy: Auto
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.3/24
  storage:
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
