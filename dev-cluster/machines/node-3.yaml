# node-3: the third leader. With node-1 founding and node-2 beside
# it, these three are the odd number of voices embedded etcd needs to
# vote. Same shape as every other machine; only the name and address
# differ.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  name: node-3
spec:
  # The lab exists to drill automated rollouts, so its machines let
  # the operator reboot them on a granted turn. Real fleets choose
  # this deliberately; the default (Manual) stages changes and waits
  # for a person.
  rebootPolicy: Auto
  network:
    interfaces:
      - name: eth0
      - name: eth1
        address: 10.10.0.3/24
  storage:
    systemA:
      device: /dev/vdc
      size: 512Mi
    systemB:
      device: /dev/vdc
      size: 512Mi
    machineState:
      device: /dev/vda
      size: 64Mi
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    clusterState:
      device: /dev/vda
    podStorage:
      device: /dev/vdb
      size: 2Gi
    podEphemeral:
      device: /dev/vdb
  sysctls:
    fs.inotify.max_user_instances: "8192"
