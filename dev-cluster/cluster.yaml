# The Cluster manifest: the document that describes what the machines
# form together. Everything here is a fact that the whole fleet must
# agree on. For this reason, it lives in its own document, instead of
# repeating (and eventually disagreeing) across Machine manifests. The
# same file travels in every machine's image, so cluster-scoped facts
# have exactly one copy. Like the Machine manifest, the cluster
# manifest is seeded into the cluster as a real resource once the API
# is up. This lets `kubectl get clusters` answer the question "what is
# this fleet?".
#
# The join token is not here on purpose. The spec carries topology.
# Secrets travel in the identity bundle (/etc/liken/token, minted
# offline by `liken mint` alongside the CAs it hashes).
apiVersion: liken.sh/v1alpha1
kind: Cluster
metadata:
  name: lab
spec:
  # The machines that run control planes, by Machine name. A machine
  # finds its role by looking for its own name in this list: a name
  # that is listed is a leader; a name that is absent is a follower.
  # One name means k3s keeps its state in sqlite. More than one name
  # means embedded etcd, and etcd's majority quorum needs an odd
  # member count: three members, not two or four. The first name is
  # the founding leader. It initializes etcd, or, if it first ran as
  # a lone sqlite leader, it migrates that datastore into etcd in
  # place, on the boot when the list first grows. Every other leader
  # joins the cluster through the founding leader. This lab seeds
  # three leaders and two followers. Changing the list is an ordinary
  # Cluster edit, and the fleet stages and applies that edit machine
  # by machine.
  leaders: [node-1, node-2, node-3]

  # Where followers make first contact: a leader's address on the
  # cluster segment, declared by its Machine manifest in
  # machines/node-1.yaml. Port 6443 is the Kubernetes API's
  # conventional port, and k3s's join protocol uses the same
  # listener. This endpoint matters only for first contact. After a
  # follower joins, k3s agents keep a client-side load balancer that
  # learns every leader, so a dead endpoint strands only brand-new
  # followers. A deployment that wants the endpoint to survive the
  # loss of its first leader can point a DNS name or a virtual IP
  # here instead. That choice belongs to the deployment, not the OS.
  endpoint: https://10.10.0.1:6443

  network:
    # The subnet that the nodes use for Kubernetes traffic. A machine
    # can have several interfaces (the lab also gives each machine an
    # internet uplink). The interface whose address falls inside this
    # subnet carries cluster traffic, and that address becomes the
    # machine's node IP.
    nodeCIDR: 10.10.0.0/24

    # The cluster's internal address plan. These values are k3s's
    # defaults, written out here instead of left assumed, because
    # every node must agree on them, and a fact that the whole fleet
    # depends on should not stay implicit. Pod addresses come from
    # clusterCIDR, service addresses come from serviceCIDR, and
    # clusterDNS is the address that every pod's resolv.conf points
    # at (this address must sit inside serviceCIDR).
    clusterCIDR: 10.42.0.0/16
    serviceCIDR: 10.43.0.0/16
    clusterDNS: 10.43.0.10
    clusterDomain: cluster.local

  time:
    # Where the leaders get their time. Followers do not appear here,
    # because they sync from the leaders themselves. Declaring an
    # upstream is the deployment's choice, never the OS's default.
    # This lab picks Cloudflare's public NTP service, because
    # Cloudflare, unlike the NTP pool, runs this service for exactly
    # this kind of anonymous use.
    upstreams: [time.cloudflare.com, time.nist.gov]

  # The fleet's opt-ins from liken's feature vocabulary. liken
  # disables k3s's bundled components by default. Naming a component
  # here declares that the fleet wants it back ({} is a feature's
  # zero configuration). The lab keeps metrics-server enabled at all
  # times, the same way node-4 keeps the dummy module enabled: this
  # exercises the computed disable list on every boot, and `kubectl
  # top nodes` proves that the feature landed. The storage-client
  # features (iscsi, nfs) are exercised by drills against the lab's
  # storage server (dev-cluster/storage). These features are enabled
  # only for those drills, so the storage guest does not have to keep
  # running between drills.
  features:
    metrics-server: {}

  releases:
    # Where release artifacts come from: the lab's release server
    # (`liken serve`, started with `make serve`), reached at QEMU's
    # built-in address for "the host machine" on a user-mode network.
    # The catalog and a target version are not seeded here on
    # purpose. A catalog entry is the digest of a release document,
    # and releases built from this repo embed the checkout's own
    # identity artifacts (the cluster CA and the join token, both
    # gitignored and minted for each checkout). Because of this, no
    # digest stays stable enough to commit. Publishing a release
    # prints its catalog entry. Adding that entry and setting
    # spec.version are live edits to the Cluster resource. This is
    # deliberate: an upgrade happens through the API, not through an
    # image rebuild.
    source: http://10.0.2.2:8017/releases
