# The Cluster manifest: the document that describes what the machines
# form together. Everything here is a fact the whole fleet must agree
# on, which is why it lives in its own document rather than being
# repeated (and inevitably diverging) across Machine manifests. The
# same file rides in every machine's image — cluster-scoped truth has
# exactly one copy — and, like the Machine manifest, it is seeded into
# the cluster as a real resource once the API is up, so `kubectl get
# clusters` answers the question "what is this fleet?".
#
# What is deliberately NOT here: the join token. The spec carries
# topology; secrets ride in the identity bundle (/etc/liken/token,
# minted offline by identity/mint.sh alongside the CAs it hashes).
apiVersion: liken.sh/v1alpha1
kind: Cluster
metadata:
  name: lab
spec:
  # The machines that run control planes, by Machine name. A machine
  # derives its role by looking for its own name here: listed means
  # leader, absent means follower. One name means k3s keeps its state
  # in sqlite; more than one means embedded etcd, whose majority
  # quorum wants an odd count — three voices, not two or four. The
  # first name is the founding leader: it initializes etcd (or, if it
  # began life as a lone sqlite leader, migrates that datastore into
  # etcd in place on the boot where the list first grows), and every
  # other leader joins through it. This lab seeds three leaders and
  # two followers; changing the list is an ordinary Cluster edit,
  # which the fleet stages and applies machine by machine.
  leaders: [node-1, node-2, node-3]

  # Where followers make first contact: a leader's address on the
  # cluster segment, which its Machine manifest promises below in
  # machines/node-1.yaml. Port 6443 is the Kubernetes API's
  # conventional port, and k3s's join protocol rides the same
  # listener. First contact is all this is — after joining, k3s
  # agents maintain a client-side load balancer that learns every
  # leader, so a dead endpoint strands only brand-new followers. A
  # deployment that wants the endpoint itself to survive its first
  # leader points a DNS name or virtual IP here instead; that choice
  # belongs to the deployment, never the OS.
  endpoint: https://10.10.0.1:6443

  network:
    # The subnet the nodes speak Kubernetes over. A machine may have
    # several interfaces (the lab gives each an internet uplink too);
    # the one whose address falls inside this subnet carries cluster
    # traffic, and that address becomes the machine's node IP.
    nodeCIDR: 10.10.0.0/24

    # The cluster's internal address plan. These are k3s's defaults,
    # written out rather than assumed: every node must agree on them,
    # and a fact the whole fleet depends on shouldn't be implicit.
    # Pod addresses come from clusterCIDR, service addresses from
    # serviceCIDR, and clusterDNS is the address every pod's
    # resolv.conf points at (it must sit inside serviceCIDR).
    clusterCIDR: 10.42.0.0/16
    serviceCIDR: 10.43.0.0/16
    clusterDNS: 10.43.0.10
    clusterDomain: cluster.local

  time:
    # Where the leaders get their time; followers don't appear here
    # because they sync from the leaders themselves. Declaring an
    # upstream is the deployment's choice, never the OS's default —
    # this lab picks Cloudflare's public NTP service, which (unlike
    # the NTP pool) is run for exactly this kind of anonymous use.
    upstreams: [time.cloudflare.com, time.nist.gov]

  releases:
    # Where release artifacts come from: the lab's release server
    # (releases/serve, started with `make serve`), reached at QEMU's
    # built-in address for "the host machine" on a user-mode network.
    # What is deliberately NOT seeded here: the catalog, or a target
    # version. A catalog entry is the digest of a release document,
    # and releases built from this repo embed the checkout's own
    # identity artifacts (the cluster CA, the join token — gitignored,
    # minted per checkout), so no digest is stable enough to commit.
    # Publishing a release prints its catalog entry; adding it and
    # setting spec.version are live edits to the Cluster resource,
    # which is the point — an upgrade is an API conversation, not an
    # image rebuild.
    source: http://10.0.2.2:8017/releases
