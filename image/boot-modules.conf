# These are the kernel modules that early boot needs before it mounts
# the system image. boot.cpio carries only these modules. The OS
# loads every other module from the system image itself, after the
# system image becomes the root filesystem.
#
# This list must stay small, because it sets the amount of RAM the
# boot loader must stage. The build resolves each name to its full
# set of dependencies at build time, the same way it resolves the
# system's own module list (build.sh).

# The root filesystem is an overlay: the read-only system image sits
# below, and a bounded tmpfs sits above it for the runtime's writes.
# Ubuntu builds overlayfs as a module.
overlay

# Mounting a boot slot (FAT32) needs vfat's default character
# encoding for long file names. The vfat driver itself is built in,
# but the encoding table is a module. Only a from-disk boot needs
# this module. The list keeps this module anyway: it adds one line,
# and making it conditional on the boot type would cost more effort
# than the space it would save.
nls_iso8859-1
