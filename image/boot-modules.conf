# Kernel modules the early boot needs before the system image is
# mounted — the only modules boot.cpio carries. Everything else the
# OS loads comes from the system image itself, after it becomes the
# root filesystem.
#
# This list must stay tiny: it is the RAM the boot loader has to
# stage. Each name is resolved to its dependency closure at build
# time, exactly like the system's own module list (build.sh).

# The root filesystem is an overlay: the read-only system image
# below, a bounded tmpfs above for the runtime's writes. Ubuntu
# builds overlayfs as a module.
overlay

# Mounting a boot slot (FAT32) pulls in vfat's default character
# encoding for long filenames; the vfat driver itself is built in,
# but the encoding table is a module. Only a from-disk boot needs
# this, but the list is one line and conditional shipping would cost
# more than it saves.
nls_iso8859-1
