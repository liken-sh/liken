# These are the kernel modules that early boot needs before it mounts
# the system image. boot.cpio carries only these modules. The OS
# loads every other module from the system image itself, after the
# system image becomes the root filesystem.
#
# This list must stay small, because it sets the amount of RAM the
# boot loader must stage. The build resolves each name to its full
# set of dependencies at build time, the same way it resolves the
# system's own module list (build.sh).

# The root filesystem is an overlay: the read-only system image sits
# below, and a bounded tmpfs sits above it for the runtime's writes.
# Ubuntu builds overlayfs as a module.
overlay

# Mounting a boot slot (FAT32) needs vfat's default character
# encoding for long file names. The vfat driver itself is built in,
# but the encoding table is a module. Only a from-disk boot needs
# this module. The list keeps this module anyway: it adds one line,
# and making it conditional on the boot type would cost more effort
# than the space it would save.
nls_iso8859-1

# The disks that boot slots live on need their drivers before any
# manifest is in hand: a from-disk boot mounts its slot to find the
# system image, and an install boot claims the disk it is standing
# in front of. Boot-disk drivers therefore cannot come from
# spec.modules, which loads only after storage settles. The kernel
# builds the virtio disk drivers in (the lab's machines), but real
# machines' controllers are modules: ahci for SATA and nvme for
# NVMe. Without them, a real machine's own disk never exists, on
# any boot.
ahci
nvme

# The installer prompts a person to press Enter, so the console it
# prompts on must be able to answer. The kernel builds the USB
# controllers in, so a USB keyboard enumerates on its own, but the
# whole HID stack is modular, and until it loads no keystroke reaches
# /dev/console. These cannot come from spec.modules either: the
# install path prompts and powers off long before declared modules
# load. Both names are needed. usbhid is the transport, hid-generic is
# the driver that binds an ordinary keyboard, and neither pulls in the
# other. Most keyboards on most machines are USB, so this belongs in
# every boot rather than in one machine's manifest.
usbhid
hid_generic
