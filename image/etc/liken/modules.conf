# This is the list of kernel modules a liken machine loads at boot.
#
# This one list has two consumers. The image build (build.sh) ships
# exactly these modules and their dependencies, and init
# (init/modules.go) loads all of them early in boot, before storage
# settles. Everything else liken needs is built into liken's vendored
# kernel. Everything here is a module because Ubuntu's generic config
# made it one. A fixed, reviewable list is better than on-demand
# autoloading, which would require shipping a modprobe program for
# the kernel to call.

# This module is vfat's default character encoding for long file
# names (CONFIG_FAT_DEFAULT_IOCHARSET is iso8859-1). The vfat driver
# itself is built in, but mounting a system slot fails without its
# encoding table. Storage needs this module, not k3s.
nls_iso8859-1

# This module is containerd's snapshotter. It turns container images
# into layered, copy-on-write filesystems.
overlay

# This module provides virtual ethernet pairs. Every pod gets one
# end, and the host keeps the other end.
veth

# This module is flannel's default backend. Pod-to-pod traffic
# between nodes travels inside VXLAN encapsulation.
vxlan

# This module lets iptables see bridged traffic. The sysctls that
# kube-proxy sets (bridge-nf-call-iptables) live in this module.
br_netfilter

# These modules provide connection tracking and NAT: the foundation
# under kube-proxy's service virtual IPs.
nf_conntrack
nf_nat
nf_conntrack_netlink

# These are the xtables/iptables kernel halves of the rules that
# k3s's bundled iptables userspace writes for services and the CNI.
ip_tables
iptable_nat
iptable_filter
iptable_mangle
ip6_tables
ip6table_nat
ip6table_filter
ip6table_mangle
xt_conntrack
xt_MASQUERADE
xt_addrtype
xt_comment
xt_mark
xt_multiport
xt_nat
xt_statistic
xt_tcpudp

# These modules provide the REJECT target. kube-proxy writes one
# REJECT rule for every service with no ready endpoints, so clients
# get an immediate refusal instead of a stalled connection.
# iptables-restore is all-or-nothing: without this module, one
# service with no endpoints fails kube-proxy's whole ruleset sync.
ipt_REJECT
ip6t_REJECT

# These modules provide ipsets: named kernel-side sets of addresses
# that one iptables rule can match against, instead of one rule per
# address. k3s's embedded network policy controller builds
# NetworkPolicy enforcement out of these sets. When `ipset save`
# fails, the controller refuses to start and silently ignores every
# NetworkPolicy. The list below has the core module, the set types
# the controller creates (hash:ip for pods, hash:net for CIDR blocks,
# hash:ip,port for named ports), and the iptables match (-m set) that
# reads them.
ip_set
ip_set_hash_ip
ip_set_hash_net
ip_set_hash_ipport
xt_set

# These modules are the rest of the network policy controller's
# iptables vocabulary. physdev matches bridged traffic by its
# original port. limit caps the rate of its logging rules. NFLOG is
# how those rules pass dropped-packet reports to userspace, through
# the nfnetlink_log channel.
xt_physdev
xt_limit
xt_NFLOG
nfnetlink_log

# These modules provide netfilter accounting, the foundation for
# kube-proxy's packet-level metrics (for example, packets dropped for
# services with no endpoints). There are two halves: the accounting
# subsystem itself, and the iptables match extension (-m nfacct) that
# feeds it. kube-proxy probes for the first module, then writes rules
# that require the second module. Shipping only one module is worse
# than shipping neither.
nfnetlink_acct
xt_nfacct
