# The kernel modules a liken machine loads at boot.
#
# This one list serves two masters: the image build (build.sh) ships
# exactly these modules and their dependencies, and init
# (init/modules.go) loads them all before starting k3s. Everything else
# k3s needs is built into our vendored kernel; everything here is a
# module because Ubuntu's generic config made it one. A fixed,
# reviewable list beats on-demand autoloading, which would require
# shipping a modprobe for the kernel to call.

# containerd's snapshotter: container images become layered,
# copy-on-write filesystems
overlay

# virtual ethernet pairs: every pod gets one end, the host keeps the other
veth

# flannel's default backend: pod-to-pod traffic between nodes rides
# inside VXLAN encapsulation
vxlan

# lets iptables see bridged traffic — the sysctls kube-proxy sets
# (bridge-nf-call-iptables) live in this module
br_netfilter

# connection tracking and NAT: the substrate under kube-proxy's
# service virtual IPs
nf_conntrack
nf_nat
nf_conntrack_netlink

# the xtables/iptables kernel halves of the rules k3s's bundled
# iptables userspace writes for services and the CNI
ip_tables
iptable_nat
iptable_filter
iptable_mangle
ip6_tables
ip6table_nat
ip6table_filter
ip6table_mangle
xt_conntrack
xt_MASQUERADE
xt_addrtype
xt_comment
xt_mark
xt_multiport
xt_nat
xt_statistic
xt_tcpudp

# the REJECT target: kube-proxy writes one for every service with no
# ready endpoints, so clients get an immediate refusal instead of a
# hang. iptables-restore is all-or-nothing — without this module, one
# endpointless service fails kube-proxy's whole ruleset sync
ipt_REJECT
ip6t_REJECT

# ipsets: named kernel-side sets of addresses that one iptables rule
# can match against, instead of one rule per address. k3s's embedded
# network policy controller builds NetworkPolicy enforcement out of
# these, and refuses to start (silently ignoring every NetworkPolicy!)
# when `ipset save` fails. The core module, the set types the
# controller creates (hash:ip for pods, hash:net for CIDR blocks,
# hash:ip,port for named ports), and the iptables match (-m set) that
# reads them
ip_set
ip_set_hash_ip
ip_set_hash_net
ip_set_hash_ipport
xt_set

# the rest of the network policy controller's iptables vocabulary:
# physdev matches bridged traffic by its original port, limit
# rate-caps its logging rules, and NFLOG is how those rules hand
# dropped-packet reports to userspace (via the nfnetlink_log channel)
xt_physdev
xt_limit
xt_NFLOG
nfnetlink_log

# netfilter accounting, the substrate for kube-proxy's packet-level
# metrics (like packets dropped for services with no endpoints). Two
# halves: the accounting subsystem itself, and the iptables match
# extension (-m nfacct) that feeds it. kube-proxy probes for the first
# and then writes rules requiring the second, so shipping only one is
# worse than shipping neither.
nfnetlink_acct
xt_nfacct
