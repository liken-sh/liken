# The Machine manifest: the one document that configures a liken
# machine. It's shaped like a Kubernetes resource on purpose: init
# reads it from this file at boot (there's no API server yet), and once
# the cluster is up, the liken operator seeds this same document into
# it as a real Machine resource and publishes the machine's live facts
# into its status. From then on the cluster's copy is the authoritative
# one: `kubectl edit machine` wins over this file, which only seeds
# clusters that don't have the Machine yet.
#
# The defaults are deliberately minimal: an empty spec means DHCP on
# the first real network interface, DNS from the lease, done.
# Configuration is for exceptions.
apiVersion: liken.sh/v1alpha1
kind: Machine
metadata:
  # The machine's name: its hostname, and its Kubernetes node name.
  name: liken-dev
spec:
  network: {}
  # Storage is declared by purpose, not by mount path; the paths are
  # liken's implementation details. Each role names the device it lives
  # on and, when sharing a disk, how much of it to take; one role per
  # disk may omit its size and take the remainder. The device path only
  # matters on the boot that claims the disk (kernel names are probe
  # order, not identity): claiming writes the role's name onto each
  # partition, and every boot after finds it by that name wherever the
  # disk enumerates. A declared role that can't be satisfied fails the
  # boot: a machine declared to have persistent state must not come up
  # ephemeral.
  storage:
    # The machine's own durable data: the staged and proven manifests
    # that let a spec edit survive a reboot. First in the canonical
    # order, so it's the first partition on its disk: the one a future
    # boot must find before it has read any spec.
    machineState:
      device: /dev/vda
      size: 64Mi
    # The operating system's own scratch space: /tmp.
    machineEphemeral:
      device: /dev/vdb
      size: 512Mi
    # k3s's state: its database, TLS material, and containerd's
    # images. Persisting this is why a reboot doesn't re-import every
    # container image.
    clusterState:
      device: /dev/vda
    # Durable storage pods claim by name: the PersistentVolumeClaim
    # pool, served by k3s's local-path provisioner.
    podStorage:
      device: /dev/vdb
      size: 2Gi
    # kubelet's working space: emptyDirs and per-pod scratch, the pool
    # that pods meter with ephemeral-storage requests and limits.
    podEphemeral:
      device: /dev/vdb
  # Kernel tuning lives in the same document as everything else. Each
  # parameter is applied twice on purpose: by init at boot (so it holds
  # before k3s starts) and by the liken operator from then on (so
  # editing the Machine in-cluster takes effect without a reboot, and
  # drift gets corrected). The kernel's default of 128 inotify
  # instances per user runs out quickly on a node where every
  # log-follower and config-watcher holds one; raising it is a common
  # first node tune.
  sysctls:
    fs.inotify.max_user_instances: "8192"
