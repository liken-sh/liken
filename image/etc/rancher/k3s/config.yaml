# k3s's configuration for a machine in the server role: the file
# /etc/rancher/k3s/config.yaml, which `k3s server` reads on its own;
# liken passes no flags. (A machine in the agent role reads agent.yaml
# beside this file instead: k3s maps config keys onto flags, and an
# agent would refuse the server-only ones here.) Everything only the
# boot can derive (the join token, the cluster's address plan, this
# machine's node IP) lands in config.yaml.d/boot.yaml, a drop-in
# directory k3s reads alongside this file; init writes it fresh every
# boot (see init/k3s.go).
#
# The static configuration is minimal: k3s bundles several conveniences
# (Traefik for ingress, a service load balancer, a metrics server) that
# liken disables. Anything a machine needs beyond the Kubernetes
# control plane itself should arrive as a declared, visible workload,
# not as a bundled default. CoreDNS stays: pods without DNS are barely
# usable.
disable:
  - traefik
  - servicelb
  - metrics-server

# The local-path storage provisioner stays: it is how the Machine
# spec's podStorage role reaches pods. A PersistentVolumeClaim becomes
# a directory under this root, which is where liken mounts that role's
# partition. On a machine that declares no podStorage the directory is
# simply part of the RAM root, and PVCs are as ephemeral as everything
# else.
default-local-storage-path: /var/lib/liken/pod-storage

# The admin kubeconfig k3s writes; group-readable is fine on a machine
# with exactly one user, who is root.
write-kubeconfig-mode: "0644"

# NodePort services listen only on the node IP's interface: the
# cluster segment, where the rest of the cluster expects to find this
# node. The default (every local IP, including the uplink and
# whatever CNI interfaces appear later) is broad enough that
# kube-proxy logs a warning about it at startup.
kube-proxy-arg:
  - nodeport-addresses=primary
