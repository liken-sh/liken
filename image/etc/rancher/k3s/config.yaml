# k3s's configuration — the file /etc/rancher/k3s/config.yaml, which
# k3s reads on its own; liken passes no flags.
#
# The posture is low-frills: k3s bundles several conveniences (Traefik
# for ingress, a service load balancer, a metrics server, a local-path
# storage provisioner) that liken disables. Anything a machine needs
# beyond the Kubernetes control plane itself should arrive as a
# declared, visible workload — not as a bundled default. CoreDNS stays:
# pods without DNS barely count as scheduled.
disable:
  - traefik
  - servicelb
  - metrics-server
  - local-storage

# The admin kubeconfig k3s writes; group-readable is fine on a machine
# with exactly one user, who is root.
write-kubeconfig-mode: "0644"

# The root filesystem is the initramfs: RAM, not a block device. kubelet's
# local-storage capacity isolation wants to measure a real filesystem
# ("cannot find filesystem info for device rootfs") to account and evict
# on ephemeral storage — an accounting that has no meaning when storage
# is memory. Memory pressure is the real signal here, and kubelet already
# watches that.
kubelet-arg:
  - local-storage-capacity-isolation=false
