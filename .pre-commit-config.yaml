# Quality checks that run before every commit, via pre-commit (or prek,
# its drop-in replacement). The Go stack here — gofmt, go vet,
# staticcheck, and a tidy go.mod — is the idiomatic minimum for a Go
# project; the rest is repo hygiene and a linter for the shell that
# implements our Make rules.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Kubernetes manifests are conventionally multi-document
        # streams (operator/manifests/operator.yaml carries a
        # namespace, RBAC, and a DaemonSet in one file).
        args: [--allow-multiple-documents]
      - id: check-merge-conflict
      - id: check-added-large-files
  # shellcheck-py wraps a prebuilt shellcheck binary, so the hook works
  # even on machines without shellcheck installed.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        # -w rewrites files in place; pre-commit fails the commit when a
        # hook modifies files, so an unformatted commit becomes a
        # formatted retry.
        entry: gofmt -l -w
        language: system
        types: [go]
      # The Go checks run per module — init, machine, and operator are
      # separate modules (see go.work), so each gets its own invocation.
      - id: go-vet
        name: go vet
        entry: bash -c 'for m in init machine operator; do go -C "$m" vet ./... || exit 1; done'
        language: system
        files: ^(init|machine|operator)/
        pass_filenames: false
      - id: go-test
        name: go test
        entry: bash -c 'for m in init machine operator; do go -C "$m" test ./... || exit 1; done'
        language: system
        files: ^(init|machine|operator)/
        pass_filenames: false
      - id: staticcheck
        name: staticcheck
        entry: bash -c 'for m in init machine operator; do (cd "$m" && staticcheck ./...) || exit 1; done'
        language: system
        files: ^(init|machine|operator)/
        pass_filenames: false
      - id: go-mod-tidy
        name: go mod tidy
        # -diff reports what tidying would change without changing it,
        # so a stale go.mod/go.sum fails loudly instead of silently
        # mutating during a commit.
        entry: bash -c 'for m in init machine operator; do go -C "$m" mod tidy -diff || exit 1; done'
        language: system
        files: ^(init|machine|operator)/
        pass_filenames: false
