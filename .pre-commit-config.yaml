# Quality checks that run before every commit, via pre-commit (or prek,
# its drop-in replacement). The Go stack here (gofmt, go vet,
# staticcheck, and a tidy go.mod) is the idiomatic minimum for a Go
# project; the rest is repo hygiene and a linter for the shell that
# implements our Make rules.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Kubernetes manifests are conventionally multi-document
        # streams (machine-operator/manifests/machine-operator.yaml carries a
        # namespace, RBAC, and a DaemonSet in one file).
        args: [--allow-multiple-documents]
      - id: check-merge-conflict
      - id: check-added-large-files
  # shellcheck-py wraps a prebuilt shellcheck binary, so the hook works
  # even on machines without shellcheck installed.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        # -w rewrites files in place; pre-commit fails the commit when a
        # hook modifies files, so an unformatted commit becomes a
        # formatted retry.
        entry: gofmt -l -w
        language: system
        types: [go]
      # The repo is one Go module (see go.mod at the root), so every
      # check is a single invocation of ./...; Go files in any domain
      # directory, present or future, are covered without listing them.
      - id: go-vet
        name: go vet
        entry: bash -c 'go vet ./...'
        language: system
        files: \.go$|^go\.(mod|sum)$
        pass_filenames: false
      # The tests write a coverage profile so the next hook can gate
      # on it; the profile itself is gitignored.
      - id: go-test
        name: go test
        entry: bash -c 'go test -coverprofile=coverage.out ./...'
        language: system
        files: \.go$|^go\.(mod|sum)$
        pass_filenames: false
      # go-test-coverage is a pinned tool dependency (the `tool`
      # directive in go.mod), so the gate needs nothing installed
      # beyond the Go toolchain. Its thresholds live in
      # .testcoverage.yml, which explains how they're chosen.
      - id: go-test-coverage
        name: go test coverage
        entry: bash -c 'go tool go-test-coverage --config=.testcoverage.yml'
        language: system
        files: \.go$|^go\.(mod|sum)$|^\.testcoverage\.yml$
        pass_filenames: false
      # Like go-test-coverage above, staticcheck is a pinned tool
      # dependency in go.mod, so every machine (and CI) runs the same
      # version without installing anything beyond the Go toolchain.
      - id: staticcheck
        name: staticcheck
        entry: bash -c 'go tool staticcheck ./...'
        language: system
        files: \.go$|^go\.(mod|sum)$
        pass_filenames: false
      - id: go-mod-tidy
        name: go mod tidy
        # -diff reports what tidying would change without changing it,
        # so a stale go.mod/go.sum fails loudly instead of silently
        # mutating during a commit.
        entry: bash -c 'go mod tidy -diff'
        language: system
        files: \.go$|^go\.(mod|sum)$
        pass_filenames: false
