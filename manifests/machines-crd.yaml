# The Machine API, declared to Kubernetes.
#
# A CustomResourceDefinition is how Kubernetes learns a new resource
# type: apply this document and the API server starts serving
# /apis/liken.sh/v1alpha1/machines, with storage, validation, watches,
# RBAC and kubectl support included and no code written. The schema below
# is the same shape as the Go types in the machine package; the
# descriptions surface in `kubectl explain machine.spec`, which makes
# the API self-documenting at the terminal.
#
# This file lands in /var/lib/rancher/k3s/server/manifests, k3s's
# auto-deploy directory: everything there is applied to the cluster at
# startup and re-applied whenever the file changes. That is a tiny,
# built-in GitOps loop, and it is the reason liken needs no
# `kubectl apply` step anywhere.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # CRD names are always <plural>.<group>; the group is a DNS name we
  # own, which is what keeps different organizations' custom "Machine"
  # types from colliding.
  name: machines.liken.sh
spec:
  group: liken.sh
  names:
    kind: Machine
    listKind: MachineList
    plural: machines
    singular: machine
    # `kubectl get liken` shows the whole OS layer at once, the way
    # `kubectl get all` shows workloads.
    categories: [liken]
  # Cluster-scoped, like Node: a machine underlies the cluster and
  # belongs to no namespace within it.
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      # The status subresource splits the object into two endpoints
      # with separate write paths: ordinary updates cannot touch
      # status, and status updates cannot touch spec. That boundary is
      # what makes "spec is declared, status is observed" enforceable
      # rather than just a convention.
      subresources:
        status: {}
      # What `kubectl get machines` prints, without -o yaml. Every
      # column here is deliberately a word rather than a boolean:
      # True/False can only say whether something is wrong, while an
      # enumerated state says what kind of wrong and what would fix it.
      additionalPrinterColumns:
        - name: Role
          type: string
          jsonPath: .status.role
        # The machine's state summarized in one word (see status.phase
        # below); the Ready condition still exists for programs, but
        # the phase is what a human scans a fleet listing for.
        - name: Status
          type: string
          jsonPath: .status.phase
        # Uptime is computed by kubectl at read time, exactly like the
        # Age column: a date-typed column renders as the time elapsed
        # since its timestamp. Deriving it from bootedAt means it is
        # always current; a literal uptime figure written into status
        # would be stale the moment the operator wrote it.
        - name: Uptime
          type: date
          jsonPath: .status.bootedAt
        - name: Address
          type: string
          jsonPath: .status.network.addresses[0]
        - name: Liken
          type: string
          jsonPath: .status.version.liken
        - name: Kernel
          type: string
          jsonPath: .status.version.kernel
        # The two convergence conditions, one per document: Cluster is
        # the Cluster document (ClusterConverged), Spec is the Machine
        # manifest (SpecConverged). The columns show the condition's
        # *reason* rather than its True/False, because the reasons are
        # already an enumerated vocabulary that says why: Converged at
        # rest, RebootPending when a change waits on a Manual reboot,
        # RejectedLastBoot when an edit was quarantined, and so on.
        - name: Cluster
          type: string
          jsonPath: .status.conditions[?(@.type=="ClusterConverged")].reason
        - name: Spec
          type: string
          jsonPath: .status.conditions[?(@.type=="SpecConverged")].reason
        # The clock's state: Synchronized, FreeRunning (no upstreams
        # declared, by design), or Unsynchronized (sources declared
        # but unreachable, which is an outage), plus the measured
        # offset from the last exchange.
        - name: Time
          type: string
          jsonPath: .status.time.state
        - name: Offset
          type: string
          jsonPath: .status.time.offset
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            A Machine is one computer running liken: the declared
            state of the operating system beneath this cluster, and
            the observed facts of the hardware it's running on.
          # Admission-time validation, run by the API server itself.
          # Partition sizes are grow-only, and the invariant is about
          # the disk, not the spec's history: a role may not be
          # declared smaller than the size the machine last booted
          # with, which status.boot.storage records. Comparing spec
          # against status (rather than against the spec's previous
          # value with oldSelf) is what keeps an edit reversible: a
          # size the machine turned out unable to satisfy can be
          # edited back down to what is actually on disk, because
          # that is not a shrink of anything real. These rules live
          # at the root of the schema because they need to see both
          # spec and status.
          #
          # CEL cannot see the machine itself, so this is one of
          # three places the same rule is enforced: a spec that
          # passes admission can still be refused by the operator
          # before staging (it checks against the real disk
          # inventory), and init never shrinks anything at boot.
          #
          # Note the method form for comparison: Kubernetes Quantity
          # values do not support the >= operator in CEL, only
          # isLessThan and friends.
          x-kubernetes-validations:
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.systemA) || !has(self.spec.storage.systemA.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.systemA) || !has(self.status.boot.storage.systemA.size) ||
                !quantity(self.spec.storage.systemA.size).isLessThan(quantity(self.status.boot.storage.systemA.size))
              message: systemA may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.systemB) || !has(self.spec.storage.systemB.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.systemB) || !has(self.status.boot.storage.systemB.size) ||
                !quantity(self.spec.storage.systemB.size).isLessThan(quantity(self.status.boot.storage.systemB.size))
              message: systemB may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.machineState) || !has(self.spec.storage.machineState.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.machineState) || !has(self.status.boot.storage.machineState.size) ||
                !quantity(self.spec.storage.machineState.size).isLessThan(quantity(self.status.boot.storage.machineState.size))
              message: machineState may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.machineEphemeral) || !has(self.spec.storage.machineEphemeral.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.machineEphemeral) || !has(self.status.boot.storage.machineEphemeral.size) ||
                !quantity(self.spec.storage.machineEphemeral.size).isLessThan(quantity(self.status.boot.storage.machineEphemeral.size))
              message: machineEphemeral may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.clusterState) || !has(self.spec.storage.clusterState.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.clusterState) || !has(self.status.boot.storage.clusterState.size) ||
                !quantity(self.spec.storage.clusterState.size).isLessThan(quantity(self.status.boot.storage.clusterState.size))
              message: clusterState may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.podStorage) || !has(self.spec.storage.podStorage.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.podStorage) || !has(self.status.boot.storage.podStorage.size) ||
                !quantity(self.spec.storage.podStorage.size).isLessThan(quantity(self.status.boot.storage.podStorage.size))
              message: podStorage may not shrink below the size this machine booted with; partitions are grow-only
            - rule: >-
                !has(self.spec) || !has(self.spec.storage) ||
                !has(self.spec.storage.podEphemeral) || !has(self.spec.storage.podEphemeral.size) ||
                !has(self.status) || !has(self.status.boot) || !has(self.status.boot.storage) ||
                !has(self.status.boot.storage.podEphemeral) || !has(self.status.boot.storage.podEphemeral.size) ||
                !quantity(self.spec.storage.podEphemeral.size).isLessThan(quantity(self.status.boot.storage.podEphemeral.size))
              message: podEphemeral may not shrink below the size this machine booted with; partitions are grow-only
          properties:
            spec:
              type: object
              description: >-
                The declared state of this machine. Fields differ in
                when they take effect: network is read by init at boot,
                sysctls and nodeLabels are both applied at boot and
                reconciled live by the liken operator, and storage and
                modules are staged and take effect at the next boot.
              properties:
                network:
                  type: object
                  description: >-
                    The machine's network configuration. Empty means the
                    default: DHCP on the first interface that looks like
                    real hardware. Applied by init at boot; changing it
                    in-cluster takes effect next boot.
                  properties:
                    interfaces:
                      type: array
                      description: >-
                        Configures the machine's interfaces explicitly,
                        each by its kernel name. A clustered machine
                        typically declares two: a DHCP uplink, and the
                        cluster-facing interface with the static
                        address its peers were told to find it at.
                      # One entry per interface: a map keyed by name,
                      # which the API server can now enforce instead
                      # of trusting.
                      x-kubernetes-list-type: map
                      x-kubernetes-list-map-keys: [name]
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                            description: >-
                              The interface to configure, as the kernel
                              names it (e.g. eth1).
                          address:
                            type: string
                            maxLength: 64
                            pattern: ^[0-9a-fA-F:.]+/[0-9]{1,3}$
                            description: >-
                              A static address in CIDR form
                              (10.10.0.1/24); the prefix length is how
                              the kernel learns the subnet. Empty means
                              DHCP on this interface.
                          gateway:
                            type: string
                            maxLength: 64
                            pattern: ^[0-9a-fA-F:.]+$
                            description: >-
                              Makes this interface the default route.
                              Optional even for static addresses; a
                              DHCP lease elsewhere may supply it.
                          nameservers:
                            type: array
                            # Atomic: nameserver order is preference
                            # order, so the list replaces as a whole.
                            x-kubernetes-list-type: atomic
                            items:
                              type: string
                              maxLength: 253
                sysctls:
                  type: object
                  description: >-
                    Kernel tuning, parameter name to desired value, e.g.
                    vm.overcommit_memory: "1". Applied by init at boot
                    and re-asserted continuously by the liken operator,
                    so an edit here takes effect without a reboot.
                  additionalProperties:
                    type: string
                modules:
                  type: array
                  description: >-
                    Extra kernel modules this machine loads at boot,
                    beyond the fixed list the OS itself needs: the
                    drivers for whatever hardware this machine's
                    workloads use. The image build ships the union of
                    every machine's declared modules, so a module
                    declared here is only loadable if the booted image
                    was built from manifests that declared it;
                    status.modules reports each name's outcome either
                    way. Admission checks shape only, because only the
                    build (for baked manifests) and the boot (for
                    later edits) can know whether a name exists.
                  # A set: order carries no meaning, and the API
                  # server can refuse duplicates instead of trusting.
                  x-kubernetes-list-type: set
                  maxItems: 64
                  items:
                    type: string
                    maxLength: 64
                    pattern: ^[A-Za-z0-9][A-Za-z0-9_-]*$
                nodeLabels:
                  type: object
                  maxProperties: 64
                  description: >-
                    This machine's scheduling identity: the labels its
                    Node object carries, which is what workloads select
                    on (which machine has the GPU, which one sits on
                    battery-backed power). Rendered into the k3s boot
                    configuration so the node registers already wearing
                    them, and reconciled live by the liken operator
                    afterward, including removing a label this spec
                    retracts, which the kubelet never does on its own.
                    Labels applied outside this spec are never touched.
                  # Three admission rules stand between a label edit and
                  # a machine that won't boot. Registration labels pass
                  # through the kubelet, and under the NodeRestriction
                  # admission plugin (which k3s enables) a kubelet given
                  # a kubernetes.io or k8s.io label outside its own
                  # allowlist refuses to start at all, so admission
                  # refuses exactly what would take the machine down and
                  # permits exactly what the kubelet permits itself: the
                  # well-known identity labels (hostname, arch, os, the
                  # topology pair, instance-type) and anything in the
                  # kubelet.kubernetes.io and node.kubernetes.io
                  # namespaces. The liken.sh namespace is refused as
                  # OS-owned: the static config stamps liken.sh/machine,
                  # and a spec fighting the OS over its own vocabulary
                  # (or over node-role, which demotion cleanup reads)
                  # has no good outcome.
                  x-kubernetes-validations:
                    - rule: >-
                        self.all(key, key.size() <= 317 && key.matches('^([a-z0-9]([-a-z0-9]*[a-z0-9])?([.][a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?[A-Za-z0-9]([-A-Za-z0-9_.]*[A-Za-z0-9])?$'))
                      message: >-
                        label keys are an optional DNS-style prefix, a
                        slash, and a name of letters, digits, dashes,
                        underscores, and dots
                    - rule: >-
                        self.all(key, !key.matches('^([^/]*[.])?(kubernetes[.]io|k8s[.]io)/') ||
                        key in ['kubernetes.io/hostname', 'kubernetes.io/arch', 'kubernetes.io/os', 'topology.kubernetes.io/region', 'topology.kubernetes.io/zone'] ||
                        key.matches('^([^/]*[.])?(kubelet[.]kubernetes[.]io|node[.]kubernetes[.]io)/'))
                      message: >-
                        the kubernetes.io and k8s.io namespaces belong to
                        Kubernetes, and the kubelet would refuse to start
                        with them; only the kubelet's own self-label
                        vocabulary is allowed (hostname, arch, os,
                        topology.kubernetes.io zone and region, and the
                        kubelet.kubernetes.io and node.kubernetes.io
                        namespaces)
                    - rule: >-
                        self.all(key, !key.matches('^([^/]*[.])?liken[.]sh/'))
                      message: >-
                        the liken.sh namespace belongs to the operating
                        system; it stamps its own labels
                  additionalProperties:
                    type: string
                    maxLength: 63
                    pattern: ^(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])?$
                rebootPolicy:
                  type: string
                  enum: [Auto, Manual]
                  default: Manual
                  description: >-
                    What the operator may do when applying the spec
                    requires a reboot (today: any storage change).
                    Manual, the default, stages the change to the
                    machineState filesystem and reports RebootPending;
                    any next boot applies it. Auto lets the operator
                    reboot the machine itself.
                storage:
                  type: object
                  description: >-
                    Assigns storage roles to disks. Each role is a
                    singleton field (a machine has one cluster state,
                    one pod-storage pool) naming the device it lives
                    on and, when sharing a disk, how much of it to
                    take; one role per disk may omit its size and take
                    the remainder. Applied by init at boot, before k3s.
                    The device path is consulted only on the boot that
                    claims a blank disk; from then on the role's
                    partition is recognized by the GPT partition name
                    written on it. Edits here are staged and take
                    effect at the next boot; a staged spec that can't
                    be satisfied is quarantined and the machine boots
                    its last proven spec instead, and only a machine
                    with no proven spec to fall back to stops the
                    boot. Roles absent from the spec are backed by the
                    machine's RAM root.
                  properties:
                    systemA:
                      type: object
                      description: >-
                        The first of the operating system's two boot
                        slots. Each slot holds one complete liken
                        version; the machine runs from one while
                        upgrades are written to the other. The slots
                        are EFI system partitions carrying FAT32,
                        because the firmware itself is their first
                        reader. They are fixed in size once claimed:
                        FAT32 doesn't grow in place.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    systemB:
                      type: object
                      description: >-
                        The second boot slot; the systemA description
                        explains how the two slots work.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    machineState:
                      type: object
                      description: >-
                        The machine's own durable data, chiefly the
                        staged and proven manifests that let a spec
                        edit survive a reboot and apply at the next
                        one. It comes first among the data roles in
                        the canonical partition order, so a future
                        boot can find it before it has read any spec.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    machineEphemeral:
                      type: object
                      description: >-
                        The operating system's own scratch space (/tmp).
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    clusterState:
                      type: object
                      description: >-
                        k3s's state: its database, TLS material, and
                        containerd's images. Persisting this is what
                        lets a reboot resume the same cluster instead
                        of starting a new one.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    podStorage:
                      type: object
                      description: >-
                        Durable storage pods claim by name: the
                        PersistentVolumeClaim pool, served by the
                        local-path provisioner.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                    podEphemeral:
                      type: object
                      description: >-
                        kubelet's working space: emptyDir volumes and
                        per-pod scratch, the pool that pods meter with
                        ephemeral-storage requests and limits.
                      required: [device]
                      properties:
                        device:
                          type: string
                          maxLength: 128
                          pattern: ^/dev/[a-zA-Z0-9/_-]+$
                        size:
                          type: string
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
            status:
              type: object
              description: >-
                What the machine observed about itself, written by init
                (via the facts file) and published by the liken
                operator. Everything here is re-derived on every
                reconcile pass (nothing is remembered), so it reports
                what currently holds, not what once did.
              properties:
                phase:
                  type: string
                  enum: [Unknown, Booting, Lost, Blocked, Updating, UpdatePending, Degraded, Ready]
                  description: >-
                    The machine's state in one word, derived
                    from the conditions on every reconcile pass (so it
                    can never disagree with them). Ready means every
                    condition holds. UpdatePending and Updating mean a
                    staged change is waiting on a reboot (Manual) or
                    one is in flight (Auto). Blocked means drift
                    exists that liken refuses or is unable to stage;
                    it needs a different edit, not time. Degraded is
                    everything else wrong; Booting means init hasn't
                    finished publishing this boot; Unknown means the
                    operator can't read the machine's facts at all.
                    Lost is the exception to self-reporting: a leader
                    writes it when this machine's heartbeat lease
                    (in liken-system) goes silent, because a
                    dead machine can't report its own death.
                role:
                  type: string
                  description: >-
                    What this machine is in its cluster: a leader (it
                    runs a control plane) or a follower (it runs
                    workloads). Derived at boot from the Cluster
                    manifest's leaders list, never declared here.
                version:
                  type: object
                  description: >-
                    The software this machine runs. The k3s and kubelet
                    versions are reported on the built-in Node object;
                    this covers the layer beneath it.
                  properties:
                    liken:
                      type: string
                    kernel:
                      type: string
                    xtables:
                      type: string
                      description: >-
                        The netfilter userspace as iptables -V reports
                        it: version and variant (legacy vs nft).
                network:
                  type: object
                  description: >-
                    The boot's networking outcome, DHCP leases and
                    static assignments alike. The top-level fields
                    summarize the primary interface (the cluster-facing
                    one when the Cluster's nodeCIDR identifies it);
                    interfaces carries the full per-interface detail.
                  properties:
                    interface:
                      type: string
                    mac:
                      type: string
                    addresses:
                      type: array
                      x-kubernetes-list-type: atomic
                      items:
                        type: string
                    gateway:
                      type: string
                    nameservers:
                      type: array
                      x-kubernetes-list-type: atomic
                      items:
                        type: string
                    leaseExpires:
                      type: string
                      format: date-time
                    interfaces:
                      type: array
                      x-kubernetes-list-type: map
                      x-kubernetes-list-map-keys: [name]
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                          mac:
                            type: string
                          address:
                            type: string
                          method:
                            type: string
                            description: >-
                              How the address arrived: DHCP or Static.
                          gateway:
                            type: string
                          nameservers:
                            type: array
                            x-kubernetes-list-type: atomic
                            items:
                              type: string
                          leaseExpires:
                            type: string
                            format: date-time
                time:
                  type: object
                  description: >-
                    The state of this machine's clock. Unlike most of
                    status it changes for the machine's whole life,
                    because the clock is disciplined continuously,
                    not configured once at boot.
                  properties:
                    state:
                      type: string
                      enum: [Synchronized, FreeRunning, Unsynchronized]
                      description: >-
                        Whether the clock is currently disciplined
                        against a source that is itself synchronized,
                        and when it isn't, whether that's by design or
                        by outage. FreeRunning means no sources were
                        ever declared: the machine deliberately runs
                        on its hardware clock. Unsynchronized means
                        sources are declared but none currently
                        answers. A free-running fleet may agree with
                        itself, but it still doesn't claim
                        Synchronized: agreement within the fleet is a
                        different claim from agreement with real-world
                        time, and certificate validation cares about
                        the difference.
                    source:
                      type: string
                      description: >-
                        The source this machine syncs from: an
                        upstream's name on a leader, or one of the
                        cluster's leaders on a follower.
                    stratum:
                      type: integer
                      description: >-
                        Distance from a reference clock, in NTP's
                        vocabulary: a source at stratum n makes this
                        machine n+1. A server that free-runs by design
                        reports the local-clock convention (10); 16
                        means unsynchronized.
                    offset:
                      type: string
                      description: >-
                        The clock error measured at the last exchange,
                        as a duration ("1.28ms"): positive when this
                        machine was behind its source.
                    lastSync:
                      type: string
                      format: date-time
                      description: >-
                        When the clock last agreed with its source.
                hardware:
                  type: object
                  properties:
                    cpus:
                      type: integer
                    memoryBytes:
                      type: integer
                    blockDevices:
                      type: array
                      description: >-
                        The machine's storage inventory: every real disk
                        the kernel found, declared in the spec or not.
                        The name is the kernel's for this boot; it is
                        assigned in probe order, so it identifies the
                        device for this boot only, not permanently.
                        The model and serial come from the device
                        itself.
                      x-kubernetes-list-type: map
                      x-kubernetes-list-map-keys: [name]
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                          sizeBytes:
                            type: integer
                          model:
                            type: string
                          serial:
                            type: string
                firmware:
                  type: object
                  description: >-
                    The machine's standing firmware state: its boot
